};

const fbApp = initializeApp(firebaseConfig);
const db   = getFirestore(fbApp);

// ── helpers ──────────────────────────────────
async function fbSave(colName, id, data){
  try{ await setDoc(doc(db, colName, id), data); }
  catch(e){ console.error('fbSave',e); }
}
async function fbLoad(colName){
  try{
    const snap = await getDocs(collection(db, colName));
    return snap.docs.map(d=>d.data());
  }catch(e){ console.error('fbLoad',e); return null; }
}

// ── expose to window so Babel script can use ─
window._fb = { db, doc, setDoc, onSnapshot, collection, getDocs, fbSave, fbLoad };
window._fbReady = true;
window.dispatchEvent(new Event('fbReady'));

function App(){
  const[auth,setAuth]=useState(null);
  const[adminPass,setAdminPass]=useState('1234');
  const[products,setProducts]=useState(INIT_PRODUCTS);
  const[customers,setCustomers]=useState(INIT_CUSTOMERS);
  const[invoices,setInvoices]=useState([]);
  const[special]=useState(INIT_SPECIAL);
  const[dbReady,setDbReady]=useState(false);
  const[syncing,setSyncing]=useState(false);
  const skipSave=useRef(false); // prevent echo on remote update

  // ── Load from Firebase on mount ──────────────
  useEffect(()=>{
    function init(){
      if(!window._fb)return;
      const {db,onSnapshot,collection}=window._fb;
      setDbReady(true);

      // Listen products
      onSnapshot(collection(db,'products'), snap=>{
        if(snap.empty) return;
        const data=snap.docs.map(d=>d.data());
        skipSave.current=true;
        setProducts(data);
        setTimeout(()=>{skipSave.current=false;},200);
      });

      // Listen customers
      onSnapshot(collection(db,'customers'), snap=>{
        if(snap.empty) return;
        const data=snap.docs.map(d=>d.data());
        skipSave.current=true;
        setCustomers(data);
        setTimeout(()=>{skipSave.current=false;},200);
      });

      // Listen invoices
      onSnapshot(collection(db,'invoices'), snap=>{
        if(snap.empty) return;
        const data=snap.docs.map(d=>d.data()).sort((a,b)=>b.num?.localeCompare?.(a.num)||0);
        skipSave.current=true;
        setInvoices(data);
        setTimeout(()=>{skipSave.current=false;},200);
      });

      // Listen projects
      onSnapshot(collection(db,'projects'), snap=>{
        if(snap.empty) return;
        const data=snap.docs.map(d=>d.data());
        skipSave.current=true;
        setProjects(data);
        setTimeout(()=>{skipSave.current=false;},200);
      });

      // Load settings (password)
      window._fb.fbLoad('settings').then(rows=>{
        if(rows&&rows.length>0&&rows[0].adminPass){
          setAdminPass(rows[0].adminPass);
        }
      });
    }
    if(window._fbReady){ init(); }
    else{ window.addEventListener('fbReady', init, {once:true}); }
    return()=>window.removeEventListener('fbReady',init);
  },[]);

  // ── Save products to Firebase whenever they change ──
  useEffect(()=>{
    if(!dbReady||skipSave.current)return;
    const {fbSave}=window._fb;
    products.forEach(p=>fbSave('products',p.id,p));
  },[products,dbReady]);

  // ── Save customers ──
  useEffect(()=>{
    if(!dbReady||skipSave.current)return;
    const {fbSave}=window._fb;
    customers.forEach(c=>fbSave('customers',c.id,c));
  },[customers,dbReady]);

  // ── Save invoices ──
  useEffect(()=>{
    if(!dbReady||skipSave.current)return;
    const {fbSave}=window._fb;
    invoices.forEach(i=>fbSave('invoices',i.id,i));
  },[invoices,dbReady]);

  // ── Save admin password ──
  useEffect(()=>{
    if(!dbReady)return;
    const {fbSave}=window._fb;
    fbSave('settings','config',{adminPass});
  },[adminPass,dbReady]);

  const lowStockProds=useMemo(()=>products.filter(p=>p.qty<=p.lowStock),[products]);
  const totalInventoryValue=useMemo(()=>{
    const prodVal=products.reduce((s,p)=>s+p.price*p.qty,0);
    const spVal=special.reduce((s,x)=>s+x.value,0);
    return prodVal+spVal;
  },[products,special]);

  // Save projects to Firebase
  useEffect(()=>{
    if(!dbReady||skipSave.current)return;
    const {fbSave}=window._fb;
    projects.forEach(p=>fbSave('projects',p.id,p));
  },[projects,dbReady]);

  function deductStock(lines){
    setProducts(prev=>prev.map(p=>{
      const l=lines.find(l=>l.id===p.id);
      return l?{...p,qty:Math.max(0,p.qty-l.qty)}:p;
    }));
  }

  // ── Delete product from Firebase too ──
  function deleteProduct(id){
    setProducts(prev=>prev.filter(p=>p.id!==id));
    if(dbReady&&window._fb){
      const {db,doc}=window._fb;
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js")
        .then(({deleteDoc})=>deleteDoc(doc(db,'products',id)))
        .catch(()=>{});
    }
  }

  // ── Delete customer from Firebase too ──
  function deleteCustomer(id){
    setCustomers(prev=>prev.filter(c=>c.id!==id));
    if(dbReady&&window._fb){
      const {db,doc}=window._fb;
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js")
        .then(({deleteDoc})=>deleteDoc(doc(db,'customers',id)))
        .catch(()=>{});
    }
  }

  // ── Delete invoice from Firebase too ──
  function deleteInvoiceFb(id){
    // Find invoice before deleting
    const inv=invoices.find(i=>i.id===id);
    // If it's a sale invoice (export), restore stock
    if(inv&&inv.type!=='import'&&inv.lines){
      setProducts(prev=>prev.map(p=>{
        const line=inv.lines.find(l=>l.id===p.id);
        return line?{...p,qty:p.qty+line.qty}:p;
      }));
    }
    setInvoices(prev=>prev.filter(i=>i.id!==id));
    if(dbReady&&window._fb){
      const {db,doc}=window._fb;
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js")
        .then(({deleteDoc})=>deleteDoc(doc(db,'invoices',id)))
        .catch(()=>{});
    }
  }

  if(!auth)return <LoginPage onLogin={setAuth} adminPass={adminPass} dbReady={dbReady}/>;
  if(auth==='customer')return <CustomerView products={products} onLogout={()=>setAuth(null)}/>;
  return <AdminApp
    products={products} setProducts={setProducts}
    customers={customers} setCustomers={setCustomers}
    invoices={invoices} setInvoices={setInvoices}
    lowStockProds={lowStockProds}
    totalInventoryValue={totalInventoryValue}
    deductStock={deductStock}
    onLogout={()=>setAuth(null)}
    adminPass={adminPass} setAdminPass={setAdminPass}
    dbReady={dbReady}
    deleteProduct={deleteProduct}
    deleteCustomer={deleteCustomer}
    deleteInvoiceFb={deleteInvoiceFb}
  />;
}

/* ══════════════════════════════════════════════

/* ══════════════════════════════════════════════
   ADMIN SHELL
══════════════════════════════════════════════ */
function AdminApp({products,setProducts,customers,setCustomers,invoices,setInvoices,lowStockProds,totalInventoryValue,deductStock,onLogout,adminPass,setAdminPass,dbReady,deleteProduct,deleteCustomer,deleteInvoiceFb}){
  const isMob=useIsMobile();
  const[tab,setTab]=useState('dashboard');
  const[showNotif,setShowNotif]=useState(false);
  const[printContent,setPrintContent]=useState(null);

  function handlePrint(inv){
    setPrintContent(inv);
    setTimeout(()=>{
      const pz=document.getElementById('print-zone');
      if(pz)pz.style.display='block';
      window.print();
      setTimeout(()=>{if(pz)pz.style.display='none';setPrintContent(null);},500);
    },150);
  }

  const TABS=[
    {id:'dashboard',label:'لوحة القيادة',icon:'📊'},
    {id:'products',label:'المنتجات',icon:'📦'},
    {id:'customers',label:'العملاء',icon:'👥'},
    {id:'invoice',label:'فاتورة جديدة',icon:'🧾'},
    {id:'saved',label:'سجل الفواتير',icon:'📋'},
    {id:'projects',label:'المشاريع',icon:'💼'},
    {id:'settings',label:'الإعدادات',icon:'⚙️'},
  ];

  return(
    <div style={{height:'100vh',background:'linear-gradient(160deg,#060a14,#0a1628,#060d1e)',display:'flex',overflow:'hidden'}}>
      {/* SIDEBAR */}
      <aside className='no-print sidebar-desktop' style={{width:220,background:'rgba(0,0,0,.25)',borderLeft:'1px solid rgba(255,255,255,.06)',display:'flex',flexDirection:'column',padding:'18px 10px',flexShrink:0,height:'100vh',overflowY:'auto',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:26,padding:'0 4px'}}>
          <div style={{width:34,height:34,borderRadius:10,background:'linear-gradient(135deg,#3b82f6,#8b5cf6)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15}}>⚡</div>
          <div>
            <div style={{fontSize:13,fontWeight:900,color:'#e2e8f0'}}>العدالة</div>
            <div style={{fontSize:9,color:'rgba(148,163,184,.45)',letterSpacing:.5}}>لوحة الإدارة</div>
          </div>
        </div>

        {TABS.map(t=>(
          <button key={t.id} className={`nav-link ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)} style={{justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'center',gap:7}}>
              <span style={{fontSize:15}}>{t.icon}</span>{t.label}
            </div>
            {t.id==='saved'&&invoices.length>0&&(
              <span style={{background:'rgba(167,139,250,.3)',color:'#a78bfa',borderRadius:50,minWidth:20,height:20,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:900}}>{invoices.length}</span>
            )}
          </button>
        ))}

        {/* Total Value Widget */}
        <div style={{margin:'16px 4px 4px',background:'linear-gradient(135deg,rgba(99,179,237,.1),rgba(167,139,250,.1))',border:'1px solid rgba(99,179,237,.2)',borderRadius:14,padding:'12px 14px'}}>
          <div style={{fontSize:10,color:'rgba(148,163,184,.6)',marginBottom:4,fontWeight:600}}>💰 إجمالي قيمة المخزون</div>
          <div style={{fontSize:16,fontWeight:900,color:'#63b3ed',direction:'ltr',textAlign:'right'}}>{fmtPrice(totalInventoryValue)}</div>
          <div style={{fontSize:10,color:'rgba(148,163,184,.45)',marginTop:2}}>أوقية موريتانية</div>
        </div>

        {/* Sync status */}
        <div style={{margin:'8px 4px 0',display:'flex',alignItems:'center',gap:7,padding:'7px 11px',borderRadius:10,background:dbReady?'rgba(52,211,153,.07)':'rgba(251,191,36,.07)',border:dbReady?'1px solid rgba(52,211,153,.18)':'1px solid rgba(251,191,36,.2)'}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:dbReady?'#34d399':'#fbbf24',flexShrink:0,boxShadow:dbReady?'0 0 6px #34d399':'0 0 6px #fbbf24'}}/>
          <span style={{fontSize:11,fontWeight:600,color:dbReady?'#34d399':'#fbbf24'}}>{dbReady?'Firebase متصل':'جاري الاتصال...'}</span>
        </div>

        <div style={{marginTop:'auto',borderTop:'1px solid rgba(255,255,255,.06)',paddingTop:12}}>
          {/* Notif bell */}
          <button className='nav-link btn' onClick={()=>setShowNotif(true)} style={{width:'100%',justifyContent:'space-between',marginBottom:4}}>
            <div style={{display:'flex',alignItems:'center',gap:7}}><span style={{fontSize:15}}>🔔</span>تنبيهات المخزون</div>
            {lowStockProds.length>0&&(
              <span className='pulse' style={{background:'#ef4444',color:'#fff',borderRadius:50,minWidth:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:900}}>{lowStockProds.length}</span>

            <span style={{fontSize:15}}>🚪</span>تسجيل خروج

        </div>

      {/* MAIN */}
      <main style={{flex:1,minWidth:0,display:'flex',flexDirection:'column'}}><div className='admin-main' style={{flex:1,overflowY:'auto',overflowX:'hidden',padding:isMob?'14px 12px 84px':'26px 22px'}}>
        {tab==='dashboard'&&<DashboardTab products={products} invoices={invoices} totalInventoryValue={totalInventoryValue} lowStockProds={lowStockProds} setTab={setTab}/>}
        {tab==='products'&&<ProductsTab products={products} setProducts={setProducts} deleteProduct={deleteProduct}/>}
        {tab==='customers'&&<CustomersTab customers={customers} setCustomers={setCustomers} deleteCustomer={deleteCustomer}/>}
        {tab==='invoice'&&<InvoiceTab products={products} setProducts={setProducts} customers={customers} setInvoices={setInvoices} deductStock={deductStock} handlePrint={handlePrint}/>}
        {tab==='saved'&&<SavedInvoicesTab invoices={invoices} setInvoices={setInvoices} handlePrint={handlePrint} products={products} customers={customers} deleteInvoiceFb={deleteInvoiceFb}/>}
        {tab==='projects'&&<ProjectsTab projects={projects} setProjects={setProjects} dbReady={dbReady}/>}
        {tab==='settings'&&<SettingsTab adminPass={adminPass} setAdminPass={setAdminPass}/>}
      </div></main>

      {/* MOBILE BOTTOM NAV */}
      <nav className='bottom-nav no-print' style={{position:'fixed',bottom:0,left:0,right:0,background:'rgba(6,10,20,.97)',borderTop:'1px solid rgba(255,255,255,.09)',zIndex:1000,padding:'6px 0 env(safe-area-inset-bottom,6px)',backdropFilter:'blur(20px)'}}>
        <div style={{display:'flex',justifyContent:'space-around',alignItems:'center'}}>
          {TABS.map(t=>(
            <button key={t.id} className='btn' onClick={()=>setTab(t.id)}
              style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'5px 8px',background:'none',border:'none',color:tab===t.id?'#63b3ed':'rgba(148,163,184,.45)',minWidth:46,position:'relative'}}>
              <span style={{fontSize:20,lineHeight:1}}>{t.icon}</span>
              <span style={{fontSize:9,fontWeight:700,whiteSpace:'nowrap'}}>{t.label.split(' ')[0]}</span>
              {t.id==='saved'&&invoices.length>0&&(
                <span style={{position:'absolute',top:2,right:4,background:'#a78bfa',color:'#fff',borderRadius:50,minWidth:15,height:15,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:900}}>{invoices.length}</span>
              )}
              {tab===t.id&&<span style={{position:'absolute',bottom:-6,left:'50%',transform:'translateX(-50%)',width:20,height:3,borderRadius:2,background:'#63b3ed'}}/>}
            </button>
          ))}
          <button className='btn' onClick={()=>setShowNotif(true)}
            style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'5px 8px',background:'none',border:'none',color:'rgba(148,163,184,.45)',minWidth:46,position:'relative'}}>
            <span style={{fontSize:20,lineHeight:1}}>🔔</span>
            <span style={{fontSize:9,fontWeight:700}}>تنبيه</span>
            {lowStockProds.length>0&&(
              <span className='pulse' style={{position:'absolute',top:2,right:4,background:'#ef4444',color:'#fff',borderRadius:50,minWidth:15,height:15,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:900}}>{lowStockProds.length}</span>
            )}
          </button>
        </div>
      </nav>

      {/* LOW STOCK MODAL */}}
      {showNotif&&(
        <Overlay onClose={()=>setShowNotif(false)}>
          <div className='pop-in' onClick={e=>e.stopPropagation()} style={{background:'#0d1525',border:'1px solid rgba(239,68,68,.25)',borderRadius:22,padding:24,width:'100%',maxWidth:500,maxHeight:'82vh',display:'flex',flexDirection:'column',boxShadow:'0 24px 60px rgba(0,0,0,.65)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div style={{fontSize:15,fontWeight:900,color:'#f87171',display:'flex',alignItems:'center',gap:8}}><span className='pulse'>🔴</span> منتجات على وشك النفاذ ({lowStockProds.length})</div>
              <Xbtn onClick={()=>setShowNotif(false)}/>
            </div>
            <div style={{overflowY:'auto',display:'flex',flexDirection:'column',gap:8}}>
              {lowStockProds.length===0?(
                <div style={{textAlign:'center',padding:'32px 0',color:'rgba(148,163,184,.4)'}}>✅ جميع المنتجات بمخزون كافٍ</div>
              ):lowStockProds.map(p=>(
                <div key={p.id} style={{background:'rgba(239,68,68,.06)',border:'1px solid rgba(239,68,68,.15)',borderRadius:12,padding:'11px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:20}}>{getEmoji(p)}</span>
                    <div>
                      <div style={{fontSize:13,fontWeight:700,color:'#e2e8f0'}}>{p.name}</div>
                      <div style={{fontSize:11,color:'rgba(148,163,184,.5)'}}>حد التنبيه: {p.lowStock}</div>
                    </div>

                  <div style={{textAlign:'left'}}>
                    <div style={{fontSize:18,fontWeight:900,color:p.qty===0?'#ef4444':'#fbbf24',direction:'ltr'}}>{p.qty}</div>
                    <div style={{fontSize:10,color:p.qty===0?'#f87171':'#fcd34d'}}>{p.qty===0?'نفذ المخزون':'منخفض'}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </Overlay>
      )}

      {/* PRINT ZONE */}
      {printContent&&(
        <div id='print-zone' style={{display:'none'}}>
          <PrintableInvoice inv={printContent}/>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════════ */
function DashboardTab({products,invoices,totalInventoryValue,lowStockProds,setTab}){
  const totalQty=products.reduce((s,p)=>s+p.qty,0);
  const invTotal=invoices.reduce((s,i)=>s+i.total,0);

  const topProds=useMemo(()=>[...products].sort((a,b)=>(b.price*b.qty)-(a.price*a.qty)).slice(0,5),[products]);
  const catStats=useMemo(()=>{
    const m={};
    products.forEach(p=>{m[p.category]=(m[p.category]||0)+p.price*p.qty});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,6);
  },[products]);

  const STATS=[
    {l:'إجمالي المخزون',v:fmtPrice(totalInventoryValue)+' أوق',i:'💰',c:'#63b3ed',s:fmt(totalQty)+' قطعة'},
    {l:'عدد الأصناف',v:fmt(products.length),i:'📦',c:'#34d399',s:'صنف مختلف'},
    {l:'فواتير صادرة',v:fmt(invoices.length),i:'🧾',c:'#a78bfa',s:fmtPrice(invTotal)+' أوق'},
    {l:'منتجات منخفضة',v:fmt(lowStockProds.length),i:'⚠️',c:'#fbbf24',s:'تحتاج تجديد',alert:lowStockProds.length>0},
  ];

  return(
    <div className='fade-up'>
      <div style={{marginBottom:22}}>
        <h1 style={{fontSize:22,fontWeight:900,color:'#e2e8f0',marginBottom:3}}>لوحة القيادة 📊</h1>
        <div style={{fontSize:12,color:'rgba(148,163,184,.55)'}}>{todayStr()}</div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(145px,1fr))',gap:10,marginBottom:20}}>
        {STATS.map(s=>(
          <div key={s.l} className='card' style={{padding:17,borderColor:s.alert?'rgba(251,191,36,.3)':undefined,background:s.alert?'rgba(251,191,36,.03)':undefined}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
              <div style={{fontSize:26}}>{s.i}</div>
              {s.alert&&<span style={{background:'rgba(239,68,68,.15)',color:'#f87171',borderRadius:50,padding:'2px 8px',fontSize:10,fontWeight:700}}>تنبيه</span>}
            </div>
            <div style={{fontSize:20,fontWeight:900,color:s.c,direction:'ltr',textAlign:'right',marginBottom:2}}>{s.v}</div>
            <div style={{fontSize:11,color:'rgba(148,163,184,.55)'}}>{s.l}</div>
            <div style={{fontSize:10,color:'rgba(148,163,184,.35)',marginTop:2}}>{s.s}</div>
          </div>
        ))}
      </div>

      <div className='mob-grid1' style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
        <div className='card' style={{padding:16}}>
          <div style={{fontSize:13,fontWeight:800,color:'#e2e8f0',marginBottom:12}}>🏆 أعلى المنتجات قيمةً</div>
          {topProds.map((p,i)=>{
            const col=CAT_COLORS[p.category]||'#94a3b8';
            const pct=totalInventoryValue>0?Math.round((p.price*p.qty/totalInventoryValue)*100):0;
            return(
              <div key={p.id} style={{marginBottom:11}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3,gap:6}}>
                  <div style={{fontSize:12,fontWeight:600,color:'#e2e8f0',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{i+1}. {p.name}</div>
                  <div style={{fontSize:12,fontWeight:800,color:col,whiteSpace:'nowrap',direction:'ltr'}}>{fmtPrice(p.price*p.qty)}</div>
                </div>
                <div style={{height:4,background:'rgba(255,255,255,.06)',borderRadius:3}}>
                  <div style={{height:'100%',background:`linear-gradient(90deg,${col},${col}77)`,borderRadius:3,width:pct+'%'}}/>
                </div>
              </div>
            );
          })}
        </div>

        <div className='card' style={{padding:16}}>
          <div style={{fontSize:13,fontWeight:800,color:'#e2e8f0',marginBottom:12}}>🗂️ توزيع القيمة بالفئات</div>
          {catStats.map(([cat,val])=>{
            const col=CAT_COLORS[cat]||'#94a3b8';
            const pct=totalInventoryValue>0?Math.round((val/totalInventoryValue)*100):0;
            return(
              <div key={cat} style={{display:'flex',alignItems:'center',gap:9,marginBottom:9}}>
                <span style={{fontSize:14}}>{CAT_ICONS[cat]||'📦'}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                    <span style={{fontSize:11,color:'#e2e8f0',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cat}</span>
                    <span style={{fontSize:11,color:col,fontWeight:700,direction:'ltr',marginRight:4}}>{pct}%</span>
                  </div>
                  <div style={{height:4,background:'rgba(255,255,255,.06)',borderRadius:3}}>
                    <div style={{height:'100%',background:col,borderRadius:3,width:pct+'%'}}/>
                  </div>
                </div>
                <div style={{fontSize:10,color:'rgba(148,163,184,.45)',whiteSpace:'nowrap',direction:'ltr',minWidth:70,textAlign:'left'}}>{fmtPrice(val)}</div>
              </div>
            );
          })}
        </div>
      </div>

      {lowStockProds.length>0&&(
        <div className='card' style={{padding:16,borderColor:'rgba(251,191,36,.2)',background:'rgba(251,191,36,.02)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:800,color:'#fbbf24'}}>⚠️ تنبيه: منتجات تحتاج تجديد</div>
            <button className='btn' onClick={()=>setTab('products')} style={{fontSize:12,color:'#63b3ed',background:'none',border:'none',fontFamily:'Cairo,sans-serif'}}>إدارة المنتجات ←</button>
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
            {lowStockProds.slice(0,10).map(p=>(
              <span key={p.id} className='tag' style={{background:'rgba(251,191,36,.1)',color:'#fbbf24',border:'1px solid rgba(251,191,36,.25)'}}>
                {getEmoji(p)} {p.name.length>18?p.name.slice(0,18)+'...':p.name} (<span style={{direction:'ltr'}}>{p.qty}</span>)
              </span>
            ))}
            {lowStockProds.length>10&&<span className='tag' style={{background:'rgba(255,255,255,.05)',color:'rgba(148,163,184,.5)'}}>+{lowStockProds.length-10}</span>}
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════
   PRODUCTS TAB
══════════════════════════════════════════════ */
function ProductsTab({products,setProducts,deleteProduct}){
  const[search,setSearch]=useState('');
  const[catF,setCatF]=useState('الكل');
  const[sortBy,setSortBy]=useState('name');
  const[showAdd,setShowAdd]=useState(false);
  const[editP,setEditP]=useState(null);
  const[addStockVal,setAddStockVal]=useState('');
  const[form,setForm]=useState({name:'',price:'',qty:'',category:'شواحن',lowStock:'5'});

  const fSet=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  function addProduct(){
    const pName=form.name.trim();
    const pPrice=parseFloat(form.price)||0;
    const pQty=parseInt(form.qty)||0;
    if(!pName||!pPrice||!pQty)return;
    setProducts(prev=>[{id:genId(),name:pName,price:pPrice,qty:pQty,category:form.category,lowStock:parseInt(form.lowStock)||5},...prev]);
    setForm({name:'',price:'',qty:'',category:'شواحن',lowStock:'5'});
    setShowAdd(false);
  }

  function saveEdit(){
    const cleaned={...editP,
      price:parseFloat(editP.price)||0,
      qty:parseInt(editP.qty)||0,
      lowStock:parseInt(editP.lowStock)||1
    };
    setProducts(prev=>prev.map(p=>p.id===cleaned.id?cleaned:p));
    setEditP(null);setAddStockVal('');
  }

  function doAddStock(){
    const v=parseInt(addStockVal)||0;
    if(v<1)return;
    setEditP(p=>({...p,qty:(parseInt(p.qty)||0)+v}));
    setAddStockVal('');
  }

  const filtered=useMemo(()=>{
    let r=products.filter(p=>{
      const mc=catF==='الكل'||p.category===catF;
      const ms=p.name.toLowerCase().includes(search.toLowerCase());
      return mc&&ms;
    });
    if(sortBy==='price-desc')r=[...r].sort((a,b)=>b.price-a.price);
    else if(sortBy==='qty-asc')r=[...r].sort((a,b)=>a.qty-b.qty);
    else if(sortBy==='value-desc')r=[...r].sort((a,b)=>(b.price*b.qty)-(a.price*a.qty));
    else r=[...r].sort((a,b)=>a.name.localeCompare(b.name,'ar'));
    return r;
  },[products,search,catF,sortBy]);

  const totalVal=useMemo(()=>filtered.reduce((s,p)=>s+p.price*p.qty,0),[filtered]);

  return(
    <div className='fade-up'>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18,flexWrap:'wrap',gap:10}}>
        <div>
          <h1 style={{fontSize:21,fontWeight:900,color:'#e2e8f0',marginBottom:3}}>المنتجات 📦</h1>
          <div style={{fontSize:12,color:'rgba(148,163,184,.55)'}}>
            <span style={{direction:'ltr',display:'inline-block'}}>{fmt(filtered.length)}</span> منتج | القيمة: <strong style={{color:'#63b3ed',direction:'ltr',display:'inline-block'}}>{fmtPrice(totalVal)}</strong> أوقية
          </div>
        </div>
        <button className='btn' onClick={()=>setShowAdd(true)} style={{background:'linear-gradient(135deg,#3b82f6,#8b5cf6)',border:'none',borderRadius:12,padding:'10px 18px',color:'#fff',fontWeight:700,fontSize:13,display:'flex',alignItems:'center',gap:7,boxShadow:'0 4px 14px rgba(59,130,246,.3)'}}>
          <span style={{fontSize:17}}>+</span> إضافة منتج
        </button>
      </div>

      {/* Filters */}
      <div style={{display:'flex',gap:9,marginBottom:13,flexWrap:'wrap'}}>
        <div style={{position:'relative',flex:1,minWidth:160}}>
          <span style={{position:'absolute',right:11,top:'50%',transform:'translateY(-50%)',color:'rgba(148,163,184,.45)',fontSize:13}}>🔍</span>
          <input className='inp' placeholder='بحث...' value={search} onChange={e=>setSearch(e.target.value)} style={{paddingRight:33,fontSize:13}}/>
        </div>
        <select className='inp' value={catF} onChange={e=>setCatF(e.target.value)} style={{width:'auto',fontSize:13}}>
          <option value='الكل'>كل الفئات</option>
          {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <select className='inp' value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{width:'auto',fontSize:13}}>
          <option value='name'>اسم ↑</option>
          <option value='price-desc'>سعر ↓</option>
          <option value='qty-asc'>كمية ↑</option>
          <option value='value-desc'>قيمة ↓</option>
        </select>
      </div>

      {/* Cat pills */}
      <div style={{display:'flex',gap:6,marginBottom:15,overflowX:'auto',paddingBottom:4}}>
        {['الكل',...CATEGORIES].map(c=>{
          const col=CAT_COLORS[c]||'#63b3ed';
          const a=c===catF;
          return(
            <button key={c} className='btn' onClick={()=>setCatF(c)} style={{padding:'5px 12px',borderRadius:50,border:a?`1px solid ${col}`:'1px solid rgba(255,255,255,.09)',background:a?`${col}1a`:'rgba(255,255,255,.03)',color:a?col:'rgba(148,163,184,.65)',fontSize:12,fontWeight:600,whiteSpace:'nowrap'}}>
              {CAT_ICONS[c]||'📦'} {c}
            </button>
          );
        })}
      </div>

      <div className='card'>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead>
              <tr style={{borderBottom:'1px solid rgba(255,255,255,.07)',background:'rgba(255,255,255,.02)'}}>
                {['المنتج','الفئة','الكمية','سعر الشراء','القيمة','الحالة',''].map(h=>(
                  <th key={h} style={{padding:'9px 13px',textAlign:'right',color:'rgba(148,163,184,.55)',fontWeight:600,fontSize:11,whiteSpace:'nowrap'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map(p=>{
                const col=CAT_COLORS[p.category]||'#94a3b8';
                const isLow=p.qty>0&&p.qty<=p.lowStock;
                const isOut=p.qty===0;
                return(
                  <tr key={p.id} style={{borderBottom:'1px solid rgba(255,255,255,.04)',background:isOut?'rgba(239,68,68,.03)':isLow?'rgba(251,191,36,.02)':'transparent',transition:'background .15s'}}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.025)'}
                    onMouseLeave={e=>e.currentTarget.style.background=isOut?'rgba(239,68,68,.03)':isLow?'rgba(251,191,36,.02)':'transparent'}>
                    <td style={{padding:'10px 13px'}}>
                      <div style={{display:'flex',alignItems:'center',gap:7}}>
                        <span style={{fontSize:17}}>{getEmoji(p)}</span>
                        <span style={{fontWeight:600,color:'#e2e8f0'}}>{p.name}</span>
                      </div>
                    </td>
                    <td style={{padding:'10px 13px'}}>
                      <span className='tag' style={{background:`${col}14`,color:col,border:`1px solid ${col}22`}}>{CAT_ICONS[p.category]||'📦'} {p.category}</span>
                    </td>
                    <td style={{padding:'10px 13px',fontWeight:700,color:isOut?'#f87171':isLow?'#fbbf24':'#e2e8f0',direction:'ltr',textAlign:'left'}}>{fmt(p.qty)}</td>
                    <td style={{padding:'10px 13px',color:'#e2e8f0',direction:'ltr',textAlign:'left'}}>{fmtPrice(p.price)} أوق</td>
                    <td style={{padding:'10px 13px',fontWeight:700,color:'#63b3ed',direction:'ltr',textAlign:'left'}}>{fmtPrice(p.price*p.qty)} أوق</td>
                    <td style={{padding:'10px 13px'}}>
                      {isOut?<span className='tag' style={{background:'rgba(239,68,68,.14)',color:'#f87171',border:'1px solid rgba(239,68,68,.22)'}}>🔴 نفذ</span>
                      :isLow?<span className='tag' style={{background:'rgba(251,191,36,.11)',color:'#fbbf24',border:'1px solid rgba(251,191,36,.22)'}}>⚠️ منخفض</span>
                      :<span className='tag' style={{background:'rgba(52,211,153,.09)',color:'#34d399',border:'1px solid rgba(52,211,153,.18)'}}>✅ متوفر</span>}
                    </td>
                    <td style={{padding:'10px 13px'}}>
                      <button className='btn' onClick={()=>{setEditP({...p});setAddStockVal('');}} style={{padding:'5px 10px',background:'rgba(99,179,237,.11)',border:'1px solid rgba(99,179,237,.2)',borderRadius:8,color:'#63b3ed',fontSize:12,fontWeight:600}}>✏️ تعديل</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* ADD PRODUCT MODAL */}
      {showAdd&&(
        <Modal onClose={()=>setShowAdd(false)} title='➕ إضافة منتج جديد'>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:11,marginBottom:12}}>
            <div style={{gridColumn:'1/-1'}}>
              <Lbl>اسم المنتج *</Lbl>
              <input className='inp' placeholder='اسم المنتج...' value={form.name} onChange={fSet('name')} onKeyDown={e=>e.key==='Enter'&&addProduct()}/>
            </div>
            <div>
              <Lbl>سعر الشراء (أوقية) *</Lbl>
              <input className='inp' inputMode='numeric' placeholder='0' value={form.price} onChange={fSet('price')}/>
            </div>
            <div>
              <Lbl>الكمية *</Lbl>
              <input className='inp' inputMode='numeric' placeholder='0' value={form.qty} onChange={fSet('qty')}/>
            </div>
            <div>
              <Lbl>الفئة</Lbl>
              <select className='inp' value={form.category} onChange={fSet('category')}>
                {CATEGORIES.map(c=><option key={c} value={c}>{CAT_ICONS[c]} {c}</option>)}
              </select>
            </div>
            <div>
              <Lbl>حد تنبيه المخزون</Lbl>
              <input className='inp' inputMode='numeric' placeholder='5' value={form.lowStock} onChange={fSet('lowStock')}/>
            </div>
          </div>
          <Btn onClick={addProduct} disabled={!form.name.trim()||!form.price||!form.qty}>✓ إضافة المنتج</Btn>
        </Modal>
      )}

      {/* EDIT PRODUCT MODAL */}
      {editP&&(
        <Modal onClose={()=>{setEditP(null);setAddStockVal('');}} title='✏️ تعديل المنتج'>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:11,marginBottom:14}}>
            <div style={{gridColumn:'1/-1'}}>
              <Lbl>اسم المنتج</Lbl>
              <input className='inp' value={editP.name} onChange={e=>setEditP(p=>({...p,name:e.target.value}))}/>
            </div>
            <div>
              <Lbl>سعر الشراء (أوقية)</Lbl>
              <input className='inp' inputMode='numeric' value={editP.price} onChange={e=>setEditP(p=>({...p,price:e.target.value}))}/>
            </div>
            <div>
              <Lbl>الكمية الحالية</Lbl>
              <input className='inp' inputMode='numeric' value={editP.qty} onChange={e=>setEditP(p=>({...p,qty:e.target.value}))}/>
            </div>
            <div>
              <Lbl>الفئة</Lbl>
              <select className='inp' value={editP.category} onChange={e=>setEditP(p=>({...p,category:e.target.value}))}>
                {CATEGORIES.map(c=><option key={c} value={c}>{CAT_ICONS[c]} {c}</option>)}
              </select>
            </div>
            <div>
              <Lbl>حد التنبيه</Lbl>
              <input className='inp' inputMode='numeric' value={editP.lowStock} onChange={e=>setEditP(p=>({...p,lowStock:e.target.value}))}/>
            </div>
            <div style={{gridColumn:'1/-1'}}>
              <Lbl>إضافة كمية وصلت حديثاً 📦</Lbl>
              <div style={{display:'flex',gap:8}}>
                <input className='inp' inputMode='numeric' placeholder='كمية وصلت...' value={addStockVal} onChange={e=>setAddStockVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doAddStock()} style={{flex:1}}/>
                <button className='btn' onClick={doAddStock} style={{padding:'10px 16px',background:'linear-gradient(135deg,#059669,#10b981)',border:'none',borderRadius:11,color:'#fff',fontWeight:700,fontSize:13,whiteSpace:'nowrap',boxShadow:'0 3px 10px rgba(5,150,105,.3)'}}>+ إضافة</button>
              </div>
              <div style={{fontSize:11,color:'rgba(148,163,184,.45)',marginTop:5}}>الكمية الحالية ستصبح: <strong style={{color:'#34d399',direction:'ltr',display:'inline-block'}}>{fmt((parseInt(editP.qty)||0)+(parseInt(addStockVal)||0))}</strong></div>
            </div>
          </div>
          <Btn onClick={saveEdit}>💾 حفظ التعديلات</Btn>
        </Modal>
      )}
    </div>
  );
}

   SAVED INVOICES TAB
══════════════════════════════════════════════ */
function SavedInvoicesTab({invoices,setInvoices,handlePrint,products,customers,deleteInvoiceFb}){
  const[sel,setSel]=useState(null);
  const[search,setSearch]=useState('');
  const[editInv,setEditInv]=useState(null); // invoice being edited
  const[delId,setDelId]=useState(null);

  const filtered=invoices.filter(inv=>
    inv.num.includes(search)||
    inv.customer.name.includes(search)||
    inv.date.includes(search)
  );

  function saveInvoiceEdit(){
    if(!editInv)return;
    const subtotal=editInv.lines.reduce((s,l)=>s+l.sellPrice*l.qty,0);
    const discAmt=Math.round(subtotal*(editInv.discount/100));
    const total=subtotal-discAmt;
    const updated={...editInv,subtotal,discAmt,total};
    setInvoices(prev=>prev.map(i=>i.id===updated.id?updated:i));
    setSel(updated);
    setEditInv(null);
  }

  function deleteInvoice(id){
    if(deleteInvoiceFb){ deleteInvoiceFb(id); }
    else{ setInvoices(prev=>prev.filter(i=>i.id!==id)); }
    setDelId(null);setSel(null);
  }

  return(
    <div className='fade-up'>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18,flexWrap:'wrap',gap:10}}>
        <div>
          <h1 style={{fontSize:21,fontWeight:900,color:'#e2e8f0',marginBottom:3}}>سجل الفواتير 📋</h1>
          <div style={{fontSize:12,color:'rgba(148,163,184,.55)'}}>
            {fmt(invoices.length)} فاتورة | إجمالي: <strong style={{color:'#a78bfa',direction:'ltr',display:'inline-block'}}>{fmtPrice(invoices.reduce((s,i)=>s+i.total,0))}</strong> أوق

        <div style={{position:'relative',width:'min(220px,100%)'}}>

          <input className='inp' placeholder='بحث برقم أو عميل...' value={search} onChange={e=>setSearch(e.target.value)} style={{paddingRight:33,fontSize:13}}/>
        </div>
      </div>

      {invoices.length===0?(
        <div style={{textAlign:'center',padding:'80px 0',color:'rgba(148,163,184,.3)'}}>
          <div style={{fontSize:52,marginBottom:12}}>📋</div>
          <div style={{fontSize:16,fontWeight:700}}>لا توجد فواتير بعد</div>
          <div style={{fontSize:12,marginTop:5}}>الفواتير ستظهر هنا بعد إنشائها</div>

          </div>
          <div style={{display:'flex',gap:9}}>
            <button className='btn' onClick={()=>{setEditInv({...sel,lines:sel.lines.map(l=>({...l})),discount:sel.discount});setSel(null);}}
              style={{flex:1,padding:11,background:'rgba(251,191,36,.15)',border:'1px solid rgba(251,191,36,.3)',borderRadius:11,color:'#fbbf24',fontWeight:900,fontSize:13}}>
              ✏️ تعديل الفاتورة
            </button>
            <button className='btn' onClick={()=>handlePrint(sel)}
              style={{flex:1,padding:11,background:'linear-gradient(135deg,#3b82f6,#8b5cf6)',border:'none',borderRadius:11,color:'#fff',fontWeight:900,fontSize:13,boxShadow:'0 4px 14px rgba(59,130,246,.28)'}}>
              🖨️ طباعة الفاتورة
            </button>
          </div>
        </Modal>
      )}

      {/* EDIT INVOICE MODAL */}
      {editInv&&(
        <Modal onClose={()=>setEditInv(null)} title={`✏️ تعديل فاتورة ${editInv.num}`} maxW={600}>
          <div style={{marginBottom:14}}>
            {/* Customer */}
            <div style={{display:'flex',alignItems:'center',gap:10,background:'rgba(255,255,255,.04)',borderRadius:11,padding:'10px 14px',marginBottom:14}}>
              <span style={{fontSize:22}}>{editInv.customer.avatar}</span>
              <div style={{fontWeight:700,color:'#e2e8f0'}}>{editInv.customer.name}</div>
              <span style={{fontSize:11,color:'rgba(148,163,184,.4)',marginRight:'auto',direction:'ltr'}}>{editInv.date}</span>
            </div>

            {/* Lines edit */}
            <div style={{fontSize:12,fontWeight:700,color:'rgba(148,163,184,.6)',marginBottom:8}}>بنود الفاتورة</div>
            <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:14}}>
              {editInv.lines.map((l,i)=>(
                <div key={l.id} style={{display:'flex',alignItems:'center',gap:8,background:'rgba(255,255,255,.03)',borderRadius:9,padding:'8px 12px',flexWrap:'wrap'}}>
                  <span style={{flex:1,fontWeight:600,color:'#e2e8f0',fontSize:13,minWidth:120}}>{l.name}</span>
                  <div style={{display:'flex',alignItems:'center',gap:5}}>
                    <span style={{fontSize:11,color:'rgba(148,163,184,.5)'}}>ك:</span>
                    <button className='btn' onClick={()=>setEditInv(p=>({...p,lines:p.lines.map((x,j)=>j===i?{...x,qty:Math.max(1,x.qty-1)}:x)}))}
                      style={{width:22,height:22,borderRadius:6,border:'1px solid rgba(255,255,255,.1)',background:'rgba(255,255,255,.05)',color:'#94a3b8',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center'}}>-</button>
                    <span style={{minWidth:24,textAlign:'center',fontWeight:700,color:'#e2e8f0',direction:'ltr'}}>{l.qty}</span>
                    <button className='btn' onClick={()=>setEditInv(p=>({...p,lines:p.lines.map((x,j)=>j===i?{...x,qty:x.qty+1}:x)}))}
                      style={{width:22,height:22,borderRadius:6,border:'none',background:'rgba(99,179,237,.2)',color:'#63b3ed',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:5}}>
                    <span style={{fontSize:11,color:'rgba(148,163,184,.5)'}}>سعر:</span>
                    <input className='inp' inputMode='numeric' value={l.sellPrice}
                      onChange={e=>setEditInv(p=>({...p,lines:p.lines.map((x,j)=>j===i?{...x,sellPrice:parseFloat(e.target.value)||0}:x)}))}
                      style={{width:70,padding:'3px 7px',textAlign:'center',fontSize:12,direction:'ltr'}}/>
                  </div>
                  <span style={{fontSize:12,fontWeight:700,color:'#34d399',direction:'ltr',minWidth:70,textAlign:'left'}}>{fmtPrice(l.sellPrice*l.qty)} أوق</span>
                  <button className='btn' onClick={()=>setEditInv(p=>({...p,lines:p.lines.filter((_,j)=>j!==i)}))}
                    style={{width:22,height:22,borderRadius:6,background:'rgba(239,68,68,.12)',border:'1px solid rgba(239,68,68,.2)',color:'#f87171',fontSize:11,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
                </div>
              ))}
            </div>

            {/* Discount + Note */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
              <div>
                <Lbl>الخصم (%)</Lbl>
                <input className='inp' inputMode='numeric' value={editInv.discount}
                  onChange={e=>setEditInv(p=>({...p,discount:parseFloat(e.target.value)||0}))}
                  style={{textAlign:'center'}}/>
              </div>
              <div>
                <Lbl>ملاحظة</Lbl>
                <input className='inp' value={editInv.note||''} onChange={e=>setEditInv(p=>({...p,note:e.target.value}))}/>
              </div>
            </div>

            {/* Live total */}
            {(()=>{
              const sub=editInv.lines.reduce((s,l)=>s+l.sellPrice*l.qty,0);
              const disc=Math.round(sub*(editInv.discount/100));
              const tot=sub-disc;
              return(
                <div style={{background:'linear-gradient(135deg,rgba(52,211,153,.08),rgba(99,179,237,.08))',border:'1px solid rgba(52,211,153,.18)',borderRadius:11,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                  <div style={{fontSize:12,color:'rgba(148,163,184,.6)'}}>
                    {disc>0&&<div>خصم: <strong style={{color:'#fbbf24'}}>- {fmtPrice(disc)} أوق</strong></div>}
                  </div>
                  <div style={{fontWeight:900,fontSize:18,color:'#34d399',direction:'ltr'}}>{fmtPrice(tot)} أوق</div>
                </div>
              );
            })()}
          </div>
          <div style={{display:'flex',gap:9}}>
            <button className='btn' onClick={()=>setEditInv(null)}
              style={{flex:1,padding:11,background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:11,color:'#94a3b8',fontWeight:700,fontSize:13}}>
              إلغاء
            </button>
            <button className='btn' onClick={saveInvoiceEdit}
              style={{flex:2,padding:11,background:'linear-gradient(135deg,#059669,#10b981)',border:'none',borderRadius:11,color:'#fff',fontWeight:900,fontSize:13,boxShadow:'0 4px 14px rgba(5,150,105,.28)'}}>
              💾 حفظ التعديلات
            </button>
          </div>
        </Modal>
      )}

      {/* DELETE CONFIRM */}
      {delId&&(
        <Modal onClose={()=>setDelId(null)} title='🗑️ حذف الفاتورة' maxW={340}>
          <div style={{textAlign:'center',padding:'10px 0 20px'}}>
            <div style={{fontSize:44,marginBottom:10}}>⚠️</div>
            <div style={{fontSize:14,color:'rgba(148,163,184,.8)',marginBottom:6}}>هل أنت متأكد من حذف هذه الفاتورة؟</div>
            {(()=>{const inv=invoices.find(i=>i.id===delId);return inv&&inv.type!=='import'&&inv.lines?.length>0&&(<div style={{fontSize:12,padding:'8px 12px',borderRadius:9,background:'rgba(52,211,153,.08)',border:'1px solid rgba(52,211,153,.2)',color:'#34d399',marginBottom:6}}>✅ سيتم إعادة {inv.lines.reduce((s,l)=>s+l.qty,0)} قطعة للمخزون تلقائياً</div>);})()}
            <div style={{fontSize:12,color:'rgba(148,163,184,.45)'}}>لا يمكن التراجع عن هذا الإجراء</div>
          </div>
          <div style={{display:'flex',gap:9}}>
            <button className='btn' onClick={()=>setDelId(null)}
              style={{flex:1,padding:11,background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:11,color:'#94a3b8',fontWeight:700,fontSize:13}}>
              إلغاء
            </button>
            <button className='btn' onClick={()=>deleteInvoice(delId)}
              style={{flex:1,padding:11,background:'rgba(239,68,68,.18)',border:'1px solid rgba(239,68,68,.35)',borderRadius:11,color:'#f87171',fontWeight:900,fontSize:13}}>
              🗑️ حذف نهائياً
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════
   PROJECTS TAB — دفتر المشاريع والحسابات
══════════════════════════════════════════════ */
const PROJ_ICONS=['🏪','🏬','🏦','💰','🏗️','🚗','🏠','📱','🛒','💼','🌾','⚡','🎯','🔧','🍕','🌍'];
const PROJ_COLORS=['#f59e0b','#3b82f6','#10b981','#8b5cf6','#ef4444','#06b6d4','#f97316','#ec4899','#14b8a6','#a855f7'];

function genTxId(){ return 'tx_'+Math.random().toString(36).slice(2,9); }

function ProjectsTab({projects,setProjects,dbReady}){
  const[selProj,setSelProj]=useState(null); // selected project id
  const[showAddProj,setShowAddProj]=useState(false);
  const[showAddTx,setShowAddTx]=useState(null); // 'income'|'expense'
  const[showEditProj,setShowEditProj]=useState(null);
  const[monthFilter,setMonthFilter]=useState(''); // 'YYYY-MM'
  const[delTxId,setDelTxId]=useState(null);

  // New project form
  const[npForm,setNpForm]=useState({name:'',icon:'💼',color:'#3b82f6'});
  // New transaction form
  const[txForm,setTxForm]=useState({amount:'',desc:'',date:todayStr()});

  const proj=projects.find(p=>p.id===selProj);

  // Delete from Firebase when project deleted
  function deleteProjectFb(id){
    setProjects(prev=>prev.filter(p=>p.id!==id));
    if(dbReady&&window._fb){
      const {db,doc}=window._fb;
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js")
        .then(({deleteDoc})=>deleteDoc(doc(db,'projects',id))).catch(()=>{});
    }
    if(selProj===id)setSelProj(null);
  }

  function addProject(){
    if(!npForm.name.trim())return;
    const newP={id:'proj_'+genId(),name:npForm.name.trim(),icon:npForm.icon,color:npForm.color,balance:0,transactions:[]};
    setProjects(p=>[...p,newP]);
    setNpForm({name:'',icon:'💼',color:'#3b82f6'});
    setShowAddProj(false);
  }

  function addTransaction(type){
    if(!txForm.amount||!txForm.desc.trim())return;
    const amt=parseFloat(txForm.amount)||0;
    const tx={id:genTxId(),type,amount:amt,desc:txForm.desc.trim(),date:txForm.date||todayStr()};
    setProjects(prev=>prev.map(p=>{
      if(p.id!==selProj)return p;
      const newBal=type==='income'?p.balance+amt:p.balance-amt;
      return{...p,balance:newBal,transactions:[tx,...(p.transactions||[])]};
    }));
    setTxForm({amount:'',desc:'',date:todayStr()});
    setShowAddTx(null);
  }

  function deleteTx(txId){
    setProjects(prev=>prev.map(p=>{
      if(p.id!==selProj)return p;
      const tx=p.transactions.find(t=>t.id===txId);
      if(!tx)return p;
      const newBal=tx.type==='income'?p.balance-tx.amount:p.balance+tx.amount;
      return{...p,balance:newBal,transactions:p.transactions.filter(t=>t.id!==txId)};
    }));
    setDelTxId(null);
  }

  // Monthly report
  const allMonths=proj?[...new Set((proj.transactions||[]).map(t=>t.date?.slice(0,7)).filter(Boolean))].sort().reverse():[];
  const filteredTx=proj?(proj.transactions||[]).filter(t=>!monthFilter||t.date?.startsWith(monthFilter)):[];
  const monthIncome=filteredTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const monthExpense=filteredTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const monthNet=monthIncome-monthExpense;

  // All projects summary
  const totalBalance=projects.reduce((s,p)=>s+p.balance,0);

  // ── PROJECTS LIST (no project selected) ──
  if(!selProj)return(
    <div className='fade-up'>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:10}}>
        <div>
          <h1 style={{fontSize:21,fontWeight:900,color:'#e2e8f0',marginBottom:3}}>المشاريع والحسابات 💼</h1>
          <div style={{fontSize:12,color:'rgba(148,163,184,.5)'}}>
            {fmt(projects.length)} مشروع | الرصيد الإجمالي: <strong style={{color:totalBalance>=0?'#34d399':'#f87171',direction:'ltr',display:'inline-block'}}>{fmtPrice(Math.abs(totalBalance))}</strong> أوق
          </div>
        </div>
        <button className='btn' onClick={()=>setShowAddProj(true)}
          style={{padding:'9px 16px',background:'linear-gradient(135deg,#3b82f6,#8b5cf6)',border:'none',borderRadius:11,color:'#fff',fontWeight:700,fontSize:13,boxShadow:'0 4px 12px rgba(59,130,246,.3)'}}>
          ➕ مشروع جديد
        </button>
      </div>

      {/* Summary cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:12,marginBottom:20}}>
        {projects.map(p=>{
          const inc=(p.transactions||[]).filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
          const exp=(p.transactions||[]).filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
          return(
            <div key={p.id} className='card btn' onClick={()=>setSelProj(p.id)}
              style={{padding:16,cursor:'pointer',border:`1px solid ${p.color}30`,transition:'all .2s'}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=p.color+'66';e.currentTarget.style.transform='translateY(-3px)';}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor=p.color+'30';e.currentTarget.style.transform='translateY(0)';}}>
              <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:12}}>
                <div style={{width:38,height:38,borderRadius:11,background:`${p.color}18`,border:`1px solid ${p.color}35`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>{p.icon}</div>
                <div style={{fontWeight:800,color:'#e2e8f0',fontSize:13,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</div>
              </div>
              <div style={{fontSize:18,fontWeight:900,color:p.balance>=0?'#34d399':'#f87171',direction:'ltr',marginBottom:8}}>{p.balance>=0?'':'-'}{fmtPrice(Math.abs(p.balance))}</div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'rgba(148,163,184,.5)'}}>
                <span style={{color:'#34d399'}}>↑ {fmtPrice(inc)}</span>
                <span style={{color:'#f87171'}}>↓ {fmtPrice(exp)}</span>
              </div>
              <div style={{marginTop:10,fontSize:11,color:p.color,fontWeight:600,opacity:.7}}>اضغط للتفاصيل ←</div>
            </div>
          );
        })}
      </div>

      {projects.length===0&&(
        <div style={{textAlign:'center',padding:'80px 0',color:'rgba(148,163,184,.3)'}}>
          <div style={{fontSize:52,marginBottom:12}}>💼</div>
          <div style={{fontSize:16,fontWeight:700}}>لا توجد مشاريع بعد</div>
          <div style={{fontSize:12,marginTop:5}}>اضغط "مشروع جديد" للبدء</div>
        </div>
      )}

      {/* Add Project Modal */}
      {showAddProj&&(
        <Modal onClose={()=>setShowAddProj(false)} title='➕ مشروع جديد' maxW={400}>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div>
              <Lbl>اسم المشروع *</Lbl>
              <input className='inp' placeholder='مثال: دبو القديمة' value={npForm.name} onChange={e=>setNpForm(p=>({...p,name:e.target.value}))}/>
            </div>
            <div>
              <Lbl>الأيقونة</Lbl>
              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                {PROJ_ICONS.map(ic=>(
                  <button key={ic} className='btn' onClick={()=>setNpForm(p=>({...p,icon:ic}))}
                    style={{width:36,height:36,borderRadius:9,fontSize:18,border:npForm.icon===ic?'2px solid #63b3ed':'1px solid rgba(255,255,255,.1)',background:npForm.icon===ic?'rgba(99,179,237,.15)':'rgba(255,255,255,.04)'}}>
                    {ic}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <Lbl>اللون</Lbl>
              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                {PROJ_COLORS.map(c=>(
                  <button key={c} className='btn' onClick={()=>setNpForm(p=>({...p,color:c}))}
                    style={{width:28,height:28,borderRadius:'50%',background:c,border:npForm.color===c?'3px solid #fff':'2px solid transparent',boxShadow:npForm.color===c?`0 0 8px ${c}`:'none'}}>
                  </button>
                ))}
              </div>
            </div>
            <button className='btn' onClick={addProject} disabled={!npForm.name.trim()}
              style={{padding:12,background:npForm.name.trim()?'linear-gradient(135deg,#3b82f6,#8b5cf6)':'rgba(255,255,255,.05)',border:'none',borderRadius:11,color:npForm.name.trim()?'#fff':'rgba(148,163,184,.3)',fontWeight:900,fontSize:14}}>
              ✅ إضافة المشروع
            </button>
          </div>
        </Modal>
      )}
    </div>
  );

  // ── PROJECT DETAIL ──
  return(
    <div className='fade-up'>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18,flexWrap:'wrap'}}>
        <button className='btn' onClick={()=>setSelProj(null)}
          style={{padding:'7px 13px',background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',borderRadius:9,color:'#94a3b8',fontSize:13,fontWeight:600}}>← رجوع</button>
        <div style={{width:36,height:36,borderRadius:11,background:`${proj.color}18`,border:`1px solid ${proj.color}35`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>{proj.icon}</div>
        <h1 style={{fontSize:19,fontWeight:900,color:'#e2e8f0'}}>{proj.name}</h1>
        <button className='btn' onClick={()=>deleteProjectFb(proj.id)}
          style={{marginRight:'auto',padding:'5px 10px',background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.2)',borderRadius:8,color:'#f87171',fontSize:11,fontWeight:700}}>🗑️ حذف</button>
      </div>

      {/* Balance + actions */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:16}}>
        <div className='card' style={{padding:14,textAlign:'center',border:`1px solid ${proj.color}30`}}>
          <div style={{fontSize:11,color:'rgba(148,163,184,.5)',marginBottom:4}}>💰 الرصيد الحالي</div>
          <div style={{fontSize:20,fontWeight:900,color:proj.balance>=0?'#34d399':'#f87171',direction:'ltr'}}>{proj.balance>=0?'':'-'}{fmtPrice(Math.abs(proj.balance))}</div>
          <div style={{fontSize:10,color:'rgba(148,163,184,.4)'}}>أوقية</div>
        </div>
        <div className='card' style={{padding:14,textAlign:'center'}}>
          <div style={{fontSize:11,color:'rgba(148,163,184,.5)',marginBottom:4}}>📈 إجمالي الدخل</div>
          <div style={{fontSize:16,fontWeight:900,color:'#34d399',direction:'ltr'}}>{fmtPrice((proj.transactions||[]).filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0))}</div>
          <div style={{fontSize:10,color:'rgba(148,163,184,.4)'}}>أوقية</div>
        </div>
        <div className='card' style={{padding:14,textAlign:'center'}}>
          <div style={{fontSize:11,color:'rgba(148,163,184,.5)',marginBottom:4}}>📉 إجمالي المصاريف</div>
          <div style={{fontSize:16,fontWeight:900,color:'#f87171',direction:'ltr'}}>{fmtPrice((proj.transactions||[]).filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0))}</div>
          <div style={{fontSize:10,color:'rgba(148,163,184,.4)'}}>أوقية</div>
        </div>
      </div>

      {/* Add income/expense buttons */}
      <div style={{display:'flex',gap:9,marginBottom:16}}>
        <button className='btn' onClick={()=>{setShowAddTx('income');setTxForm({amount:'',desc:'',date:todayStr()});}}
          style={{flex:1,padding:11,background:'rgba(52,211,153,.12)',border:'1px solid rgba(52,211,153,.25)',borderRadius:11,color:'#34d399',fontWeight:900,fontSize:13}}>
          ➕ إضافة دخل
        </button>
        <button className='btn' onClick={()=>{setShowAddTx('expense');setTxForm({amount:'',desc:'',date:todayStr()});}}
          style={{flex:1,padding:11,background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.22)',borderRadius:11,color:'#f87171',fontWeight:900,fontSize:13}}>
          ➖ إضافة مصروف
        </button>
      </div>

      {/* Month filter */}
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,flexWrap:'wrap'}}>
        <div style={{fontSize:12,fontWeight:700,color:'rgba(148,163,184,.6)'}}>📅 تصفية حسب الشهر:</div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
          <button className='btn' onClick={()=>setMonthFilter('')}
            style={{padding:'4px 10px',borderRadius:7,fontSize:11,fontWeight:700,border:!monthFilter?'1px solid #63b3ed':'1px solid rgba(255,255,255,.1)',background:!monthFilter?'rgba(99,179,237,.15)':'rgba(255,255,255,.04)',color:!monthFilter?'#63b3ed':'rgba(148,163,184,.6)'}}>الكل</button>
          {allMonths.map(m=>(
            <button key={m} className='btn' onClick={()=>setMonthFilter(m)}
              style={{padding:'4px 10px',borderRadius:7,fontSize:11,fontWeight:700,border:monthFilter===m?'1px solid #63b3ed':'1px solid rgba(255,255,255,.1)',background:monthFilter===m?'rgba(99,179,237,.15)':'rgba(255,255,255,.04)',color:monthFilter===m?'#63b3ed':'rgba(148,163,184,.6)',direction:'ltr'}}>
              {m}
            </button>
          ))}
        </div>
      </div>

      {/* Monthly summary if filtered */}
      {monthFilter&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:9,marginBottom:14}}>
          <div style={{padding:'10px 12px',borderRadius:10,background:'rgba(52,211,153,.07)',border:'1px solid rgba(52,211,153,.18)',textAlign:'center'}}>
            <div style={{fontSize:10,color:'rgba(148,163,184,.5)',marginBottom:3}}>دخل الشهر</div>
            <div style={{fontSize:14,fontWeight:900,color:'#34d399',direction:'ltr'}}>{fmtPrice(monthIncome)}</div>
          </div>
          <div style={{padding:'10px 12px',borderRadius:10,background:'rgba(239,68,68,.07)',border:'1px solid rgba(239,68,68,.18)',textAlign:'center'}}>
            <div style={{fontSize:10,color:'rgba(148,163,184,.5)',marginBottom:3}}>مصاريف الشهر</div>
            <div style={{fontSize:14,fontWeight:900,color:'#f87171',direction:'ltr'}}>{fmtPrice(monthExpense)}</div>
          </div>
          <div style={{padding:'10px 12px',borderRadius:10,background:monthNet>=0?'rgba(52,211,153,.07)':'rgba(239,68,68,.07)',border:`1px solid ${monthNet>=0?'rgba(52,211,153,.18)':'rgba(239,68,68,.18)'}`,textAlign:'center'}}>
            <div style={{fontSize:10,color:'rgba(148,163,184,.5)',marginBottom:3}}>صافي الشهر</div>
            <div style={{fontSize:14,fontWeight:900,color:monthNet>=0?'#34d399':'#f87171',direction:'ltr'}}>{monthNet>=0?'':'-'}{fmtPrice(Math.abs(monthNet))}</div>
          </div>
        </div>
      )}

      {/* Transactions list */}
      <div className='card' style={{padding:14}}>
        <div style={{fontSize:13,fontWeight:700,color:'#e2e8f0',marginBottom:11}}>
          سجل العمليات {monthFilter?`(${monthFilter})`:''} ({fmt(filteredTx.length)})
        </div>
        {filteredTx.length===0?(
          <div style={{textAlign:'center',padding:'40px 0',color:'rgba(148,163,184,.3)'}}>
            <div style={{fontSize:34,marginBottom:8}}>📋</div>
            <div style={{fontSize:13,fontWeight:700}}>لا توجد عمليات</div>
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {filteredTx.map(tx=>(
              <div key={tx.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:10,background:'rgba(255,255,255,.03)',border:`1px solid ${tx.type==='income'?'rgba(52,211,153,.12)':'rgba(239,68,68,.12)'}`}}>
                <div style={{width:32,height:32,borderRadius:9,background:tx.type==='income'?'rgba(52,211,153,.12)':'rgba(239,68,68,.1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>
                  {tx.type==='income'?'📈':'📉'}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,color:'#e2e8f0',fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{tx.desc}</div>
                  <div style={{fontSize:10,color:'rgba(148,163,184,.45)',direction:'ltr',display:'inline-block'}}>{tx.date}</div>
                </div>
                <div style={{fontWeight:900,fontSize:14,color:tx.type==='income'?'#34d399':'#f87171',direction:'ltr',whiteSpace:'nowrap'}}>
                  {tx.type==='income'?'+':'-'}{fmtPrice(tx.amount)}
                </div>
                <button className='btn' onClick={()=>setDelTxId(tx.id)}
                  style={{width:24,height:24,borderRadius:7,background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.15)',color:'#f87171',fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>✕</button>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Add Transaction Modal */}
      {showAddTx&&(
        <Modal onClose={()=>setShowAddTx(null)} title={showAddTx==='income'?'➕ إضافة دخل':'➖ إضافة مصروف'} maxW={380}>
          <div style={{display:'flex',flexDirection:'column',gap:11}}>
            <div>
              <Lbl>المبلغ (أوقية) *</Lbl>
              <input className='inp' inputMode='numeric' placeholder='0' value={txForm.amount}
                onChange={e=>setTxForm(p=>({...p,amount:e.target.value}))} style={{direction:'ltr',textAlign:'center',fontSize:18,fontWeight:700}}/>
            </div>
            <div>
              <Lbl>الوصف *</Lbl>
              <input className='inp' placeholder={showAddTx==='income'?'مثال: إيجار شهر مارس':'مثال: فاتورة كهرباء'} value={txForm.desc}
                onChange={e=>setTxForm(p=>({...p,desc:e.target.value}))}/>
            </div>
            <div>
              <Lbl>التاريخ</Lbl>
              <input className='inp' type='date' value={txForm.date} onChange={e=>setTxForm(p=>({...p,date:e.target.value}))} style={{direction:'ltr'}}/>
            </div>
            <button className='btn' onClick={()=>addTransaction(showAddTx)}
              disabled={!txForm.amount||!txForm.desc.trim()}
              style={{padding:12,background:(!txForm.amount||!txForm.desc.trim())?'rgba(255,255,255,.05)':showAddTx==='income'?'linear-gradient(135deg,#059669,#10b981)':'linear-gradient(135deg,#dc2626,#ef4444)',border:'none',borderRadius:11,color:(!txForm.amount||!txForm.desc.trim())?'rgba(148,163,184,.3)':'#fff',fontWeight:900,fontSize:14}}>
              {showAddTx==='income'?'✅ إضافة الدخل':'✅ إضافة المصروف'}
            </button>
          </div>
        </Modal>
      )}

      {/* Delete Transaction Confirm */}
      {delTxId&&(
        <Modal onClose={()=>setDelTxId(null)} title='حذف العملية' maxW={320}>
          <div style={{textAlign:'center',padding:'10px 0 18px'}}>
            <div style={{fontSize:40,marginBottom:8}}>⚠️</div>
            <div style={{fontSize:13,color:'rgba(148,163,184,.7)'}}>سيتم حذف هذه العملية وتعديل الرصيد</div>
          </div>
          <div style={{display:'flex',gap:9}}>
            <button className='btn' onClick={()=>setDelTxId(null)}
              style={{flex:1,padding:10,background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:10,color:'#94a3b8',fontWeight:700}}>إلغاء</button>
            <button className='btn' onClick={()=>deleteTx(delTxId)}
              style={{flex:1,padding:10,background:'rgba(239,68,68,.18)',border:'1px solid rgba(239,68,68,.35)',borderRadius:10,color:'#f87171',fontWeight:900}}>🗑️ حذف</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════
   CUSTOMERS TAB
══════════════════════════════════════════════ */
function CustomersTab({customers,setCustomers,deleteCustomer}){
  const[showAdd,setShowAdd]=useState(false);
  const[delId,setDelId]=useState(null);
  const[search,setSearch]=useState('');
  const[form,setForm]=useState({name:'',phone:'',avatar:'👤',color:'#63b3ed'});
  const fSet=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  function addCustomer(){
    if(!form.name.trim())return;
    setCustomers(p=>[...p,{id:genId(),name:form.name.trim(),phone:form.phone.trim(),avatar:form.avatar,color:form.color}]);
    setForm({name:'',phone:'',avatar:'👤',color:'#63b3ed'});
    setShowAdd(false);
  }

  const filtered=customers.filter(c=>c.name.includes(search)||c.phone.includes(search));

  return(
    <div className='fade-up'>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18,flexWrap:'wrap',gap:10}}>
        <div>
          <h1 style={{fontSize:21,fontWeight:900,color:'#e2e8f0',marginBottom:3}}>العملاء 👥</h1>
          <div style={{fontSize:12,color:'rgba(148,163,184,.55)'}}>{fmt(customers.length)} عميل</div>
        </div>
        <button className='btn' onClick={()=>setShowAdd(true)} style={{background:'linear-gradient(135deg,#3b82f6,#8b5cf6)',border:'none',borderRadius:12,padding:'10px 18px',color:'#fff',fontWeight:700,fontSize:13,display:'flex',alignItems:'center',gap:7,boxShadow:'0 4px 14px rgba(59,130,246,.3)'}}>
          <span style={{fontSize:17}}>+</span> إضافة عميل
        </button>
      </div>

      <div style={{position:'relative',maxWidth:300,marginBottom:16}}>
        <span style={{position:'absolute',right:11,top:'50%',transform:'translateY(-50%)',color:'rgba(148,163,184,.45)',fontSize:13}}>🔍</span>
        <input className='inp' placeholder='بحث...' value={search} onChange={e=>setSearch(e.target.value)} style={{paddingRight:33,fontSize:13}}/>
      </div>

      {filtered.length===0?(
        <div style={{textAlign:'center',padding:'60px 0',color:'rgba(148,163,184,.3)'}}>
          <div style={{fontSize:46,marginBottom:10}}>👥</div>
          <div style={{fontSize:16,fontWeight:700}}>لا يوجد عملاء</div>
        </div>
      ):(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:10}}>
          {filtered.map(c=>(
            <div key={c.id} className='card' style={{padding:18,position:'relative',textAlign:'center',transition:'transform .2s,box-shadow .2s'}}
              onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-3px)';e.currentTarget.style.boxShadow=`0 10px 26px ${c.color}20`}}
              onMouseLeave={e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='none'}}>
              <button className='btn' onClick={()=>setDelId(c.id)} style={{position:'absolute',top:10,left:10,width:26,height:26,borderRadius:7,background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.18)',color:'#f87171',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
              <div style={{width:54,height:54,borderRadius:16,background:`${c.color}18`,border:`2px solid ${c.color}40`,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:24,marginBottom:8}}>{c.avatar}</div>
              <div style={{fontSize:14,fontWeight:800,color:'#e2e8f0',marginBottom:3}}>{c.name}</div>
              {c.phone?<div style={{fontSize:12,color:'rgba(148,163,184,.55)'}}>📞 {c.phone}</div>:<div style={{fontSize:11,color:'rgba(148,163,184,.3)'}}>لا يوجد هاتف</div>}
            </div>
          ))}
        </div>
      )}

      {showAdd&&(
        <Modal onClose={()=>setShowAdd(false)} title='👤 إضافة عميل جديد'>
          <div style={{textAlign:'center',marginBottom:14}}>
            <div style={{width:60,height:60,borderRadius:17,background:`${form.color}18`,border:`2px solid ${form.color}44`,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:28}}>{form.avatar}</div>
          </div>
          <Lbl>الأيقونة</Lbl>
          <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:12}}>
            {AVATARS.map(a=>(
              <button key={a} className='btn' onClick={()=>setForm(f=>({...f,avatar:a}))} style={{width:33,height:33,borderRadius:8,border:form.avatar===a?`2px solid ${form.color}`:'1px solid rgba(255,255,255,.09)',background:form.avatar===a?`${form.color}22`:'rgba(255,255,255,.04)',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center'}}>{a}</button>
            ))}
          </div>
          <Lbl>اللون</Lbl>
          <div style={{display:'flex',gap:7,marginBottom:13,flexWrap:'wrap'}}>
            {CUST_COLORS.map(col=>(
              <button key={col} className='btn' onClick={()=>setForm(f=>({...f,color:col}))} style={{width:25,height:25,borderRadius:'50%',border:form.color===col?'3px solid #fff':'2px solid transparent',background:col,boxShadow:form.color===col?`0 0 0 2px ${col}`:'none'}}/>
            ))}
          </div>
          <Lbl>الاسم *</Lbl>
          <input className='inp' placeholder='اسم العميل...' value={form.name} onChange={fSet('name')} style={{marginBottom:9}} onKeyDown={e=>e.key==='Enter'&&addCustomer()}/>
          <Lbl>رقم الهاتف <span style={{color:'rgba(148,163,184,.35)',fontSize:11}}>(اختياري)</span></Lbl>
          <input className='inp' placeholder='رقم الهاتف...' value={form.phone} onChange={fSet('phone')} style={{marginBottom:15}} type='tel'/>
          <Btn onClick={addCustomer} disabled={!form.name.trim()}>✓ إضافة العميل</Btn>
        </Modal>
      )}

      {delId&&(
        <Modal onClose={()=>setDelId(null)} title='🗑️ حذف العميل' maxW={340}>
          <div style={{textAlign:'center',marginBottom:18,color:'rgba(148,163,184,.65)',fontSize:13}}>هل تريد حذف هذا العميل؟ لا يمكن التراجع.</div>
          <div style={{display:'flex',gap:9}}>
            <button className='btn' onClick={()=>setDelId(null)} style={{flex:1,padding:11,background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:11,color:'#94a3b8',fontWeight:700,fontSize:13}}>إلغاء</button>
            <button className='btn' onClick={()=>{setCustomers(p=>p.filter(c=>c.id!==delId));setDelId(null);}} style={{flex:1,padding:11,background:'linear-gradient(135deg,#ef4444,#dc2626)',border:'none',borderRadius:11,color:'#fff',fontWeight:700,fontSize:13,boxShadow:'0 4px 12px rgba(239,68,68,.28)'}}>حذف</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════
