function InvoiceTab({products,customers,setInvoices,deductStock,handlePrint,setProducts}){
  // ── Step 1: pick type → Step 2: pick customer → Step 3: build invoice ──
  const[step,setStep]=useState(0); // 0=type, 1=customer, 2=build
  const[invType,setInvType]=useState(null); // 'export'|'import'
  const[customer,setCustomer]=useState(null);
  const[lines,setLines]=useState([]);
  const[pSearch,setPSearch]=useState('');
  const[discount,setDiscount]=useState(0);
  const[customDisc,setCustomDisc]=useState('');
  const[note,setNote]=useState('');
  const[invN]=useState(makeInvNum);
  const[belowCostWarning,setBelowCostWarning]=useState(null);

  // Import-only: new product form
  const[newProd,setNewProd]=useState({name:'',qty:'',price:'',category:'أخرى'});
  const[showNewProd,setShowNewProd]=useState(false);

  const CATS=['هواتف ذكية','هواتف عادية','أجهزة لوحية','شواحن','كابلات','باوربانك','سماعات وكوتير','أجهزة صوتية','اكسسوارات','أخرى'];

  const filteredProds=useMemo(()=>{
    if(!pSearch.trim())return[];
    return products.filter(p=>
      (invType==='import'||p.qty>0)&&
      p.name.toLowerCase().includes(pSearch.toLowerCase())
    ).slice(0,8);
  },[products,pSearch,invType]);

  function reset(){
    setStep(0);setInvType(null);setCustomer(null);setLines([]);
    setPSearch('');setDiscount(0);setCustomDisc('');setNote('');
    setShowNewProd(false);setNewProd({name:'',qty:'',price:'',category:'أخرى'});
  }

  function addLine(p){
    setLines(prev=>{
      const ex=prev.find(l=>l.id===p.id);
      if(ex){
        if(invType==='export'&&ex.qty>=p.qty)return prev;
        return prev.map(l=>l.id===p.id?{...l,qty:l.qty+1}:l);
      }
      return[...prev,{...p,qty:1,sellPrice:p.price,costPrice:p.price}];
    });
    setPSearch('');
  }

  // Add brand-new product (import only) → save to products list too
  function addNewProduct(){
    if(!newProd.name.trim()||!newProd.price||!newProd.qty)return;
    const id=genId();
    const prod={
      id,
      name:newProd.name.trim(),
      price:parseFloat(newProd.price)||0,
      qty:parseInt(newProd.qty)||0,
      category:newProd.category,
      lowStock:3,
    };
    // Save to global products list
    setProducts(prev=>[...prev,prod]);
    // Add to invoice lines
    setLines(prev=>[...prev,{...prod,qty:parseInt(newProd.qty)||1,sellPrice:prod.price,costPrice:prod.price}]);
    setNewProd({name:'',qty:'',price:'',category:'أخرى'});
    setShowNewProd(false);
    setPSearch('');
  }

  function handleSellPriceChange(lineId,val){
    setLines(prev=>prev.map(l=>l.id===lineId?{...l,sellPrice:parseFloat(val)||0}:l));
  }
  function handleSellPriceBlur(lineId){
    if(invType==='import')return; // no below-cost check on import
    const line=lines.find(l=>l.id===lineId);
    if(line&&line.sellPrice>0&&line.sellPrice<line.costPrice)
      setBelowCostWarning({lineId,newPrice:line.sellPrice,originalPrice:line.costPrice,productName:line.name});
  }

  const effDisc=Number(customDisc)||discount;
  const subtotal=lines.reduce((s,l)=>s+l.sellPrice*l.qty,0);
  const discAmt=Math.round(subtotal*(effDisc/100));
  const total=subtotal-discAmt;

  function confirmInvoice(){
    const inv={
      id:genId(),num:invN,
      type:invType, // 'export'|'import'
      customer,lines,subtotal,discount:effDisc,discAmt,total,
      date:todayStr(),note
    };
    setInvoices(p=>[inv,...p]);
    if(invType==='export') deductStock(lines);
    // import: stock already added when product was created/added
    handlePrint(inv);
    reset();
  }

  // ══════════════════════════════
  // STEP 0 — Pick invoice type
  // ══════════════════════════════
  if(step===0)return(
    <div className='fade-up'>
      <h1 style={{fontSize:21,fontWeight:900,color:'#e2e8f0',marginBottom:5}}>فاتورة جديدة 🧾</h1>
      <p style={{fontSize:13,color:'rgba(148,163,184,.55)',marginBottom:28}}>اختر نوع الفاتورة</p>
      <div className='mob-grid2' style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,maxWidth:520}}>

        {/* EXPORT */}
        <div className='card btn' onClick={()=>{setInvType('export');setStep(1);}}
          style={{padding:'28px 20px',textAlign:'center',cursor:'pointer',border:'1px solid rgba(52,211,153,.2)',background:'rgba(52,211,153,.05)',transition:'all .22s'}}
          onMouseEnter={e=>{e.currentTarget.style.background='rgba(52,211,153,.12)';e.currentTarget.style.transform='translateY(-4px)';e.currentTarget.style.boxShadow='0 16px 36px rgba(52,211,153,.15)';}}
          onMouseLeave={e=>{e.currentTarget.style.background='rgba(52,211,153,.05)';e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='none';}}>
          <div style={{fontSize:44,marginBottom:12}}>🛒</div>
          <div style={{fontSize:17,fontWeight:900,color:'#34d399',marginBottom:6}}>فاتورة بيع</div>
          <div style={{fontSize:12,color:'rgba(148,163,184,.6)',lineHeight:1.6}}>بيع منتجات للعملاء<br/>يُخصم المخزون تلقائياً</div>
          <div style={{marginTop:14,padding:'7px 0',background:'rgba(52,211,153,.18)',borderRadius:10,fontSize:13,fontWeight:700,color:'#34d399'}}>اختيار ←</div>
        </div>

        {/* IMPORT */}
        <div className='card btn' onClick={()=>{setInvType('import');setStep(1);}}
          style={{padding:'28px 20px',textAlign:'center',cursor:'pointer',border:'1px solid rgba(251,191,36,.2)',background:'rgba(251,191,36,.05)',transition:'all .22s'}}
          onMouseEnter={e=>{e.currentTarget.style.background='rgba(251,191,36,.12)';e.currentTarget.style.transform='translateY(-4px)';e.currentTarget.style.boxShadow='0 16px 36px rgba(251,191,36,.15)';}}
          onMouseLeave={e=>{e.currentTarget.style.background='rgba(251,191,36,.05)';e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='none';}}>
          <div style={{fontSize:44,marginBottom:12}}>📦</div>
          <div style={{fontSize:17,fontWeight:900,color:'#fbbf24',marginBottom:6}}>فاتورة استيراد</div>
          <div style={{fontSize:12,color:'rgba(148,163,184,.6)',lineHeight:1.6}}>استيراد بضاعة للمحل<br/>يمكن إضافة منتجات جديدة</div>
          <div style={{marginTop:14,padding:'7px 0',background:'rgba(251,191,36,.18)',borderRadius:10,fontSize:13,fontWeight:700,color:'#fbbf24'}}>اختيار ←</div>
        </div>
      </div>
    </div>
  );

  // ══════════════════════════════
  // STEP 1 — Pick customer
  // ══════════════════════════════
  if(step===1)return(
    <div className='fade-up'>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
        <button className='btn' onClick={reset} style={{background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',borderRadius:9,padding:'7px 13px',color:'#94a3b8',fontSize:13,fontWeight:600}}>← رجوع</button>
        <div>
          <h1 style={{fontSize:20,fontWeight:900,color:'#e2e8f0'}}>
            {invType==='import'?'📦 فاتورة استيراد':'🛒 فاتورة بيع'}
          </h1>
          <div style={{fontSize:12,color:'rgba(148,163,184,.45)',marginTop:2}}>اختر {invType==='import'?'المورد':'العميل'}</div>
        </div>
        <div style={{marginRight:'auto',padding:'5px 13px',borderRadius:50,fontSize:12,fontWeight:700,background:invType==='import'?'rgba(251,191,36,.12)':'rgba(52,211,153,.12)',color:invType==='import'?'#fbbf24':'#34d399',border:invType==='import'?'1px solid rgba(251,191,36,.25)':'1px solid rgba(52,211,153,.25)'}}>
          {invType==='import'?'📦 استيراد':'🛒 بيع'}
        </div>
      </div>
      {customers.length===0?(
        <div style={{textAlign:'center',padding:'60px 0',color:'rgba(148,163,184,.35)'}}>
          <div style={{fontSize:46,marginBottom:10}}>👥</div>
          <div style={{fontSize:15,fontWeight:700}}>لا يوجد {invType==='import'?'موردون':'عملاء'}</div>
          <div style={{fontSize:12,marginTop:5}}>أضف من قسم العملاء أولاً</div>
        </div>
      ):(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(195px,1fr))',gap:11}}>
          {customers.map(c=>(
            <div key={c.id} className='card btn' onClick={()=>{setCustomer(c);setStep(2);}} style={{padding:18,textAlign:'center',cursor:'pointer',transition:'all .2s'}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=c.color+'66';e.currentTarget.style.transform='translateY(-3px)';}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='rgba(255,255,255,.07)';e.currentTarget.style.transform='translateY(0)';}}>
              <div style={{width:50,height:50,borderRadius:14,background:`${c.color}18`,border:`2px solid ${c.color}40`,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:22,marginBottom:8}}>{c.avatar}</div>
              <div style={{fontSize:14,fontWeight:800,color:'#e2e8f0',marginBottom:3}}>{c.name}</div>
              {c.phone&&<div style={{fontSize:11,color:'rgba(148,163,184,.5)'}}>📞 {c.phone}</div>}
              <div style={{marginTop:11,padding:'6px 0',background:`${c.color}18`,borderRadius:9,fontSize:12,fontWeight:700,color:c.color}}>اختيار ←</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );

  // ══════════════════════════════
  // STEP 2 — Build invoice
  // ══════════════════════════════
  const isImport=invType==='import';
  const accentColor=isImport?'#fbbf24':'#34d399';
  const accentBg=isImport?'rgba(251,191,36,.12)':'rgba(52,211,153,.12)';

  return(
    <div className='fade-up'>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18,flexWrap:'wrap'}}>
        <button className='btn' onClick={()=>setStep(1)} style={{background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',borderRadius:9,padding:'7px 13px',color:'#94a3b8',fontSize:13,fontWeight:600}}>← رجوع</button>
        <h1 style={{fontSize:19,fontWeight:900,color:'#e2e8f0'}}>
          {isImport?'📦':'🛒'} {customer.name}
        </h1>
        <div style={{padding:'4px 12px',borderRadius:50,fontSize:11,fontWeight:700,background:accentBg,color:accentColor,border:`1px solid ${accentColor}40`}}>
          {isImport?'استيراد':'بيع'}
        </div>
        <span style={{fontSize:12,color:'rgba(148,163,184,.4)',marginRight:'auto',direction:'ltr'}}>{invN}</span>
      </div>

      <div className='inv-grid' style={{display:'grid',gridTemplateColumns:'1fr 310px',gap:14,alignItems:'start'}}>
        {/* LEFT */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>

          {/* Search existing products */}
          <div className='card' style={{padding:15}}>
            <div style={{fontSize:13,fontWeight:700,color:'#e2e8f0',marginBottom:9}}>
              🔍 {isImport?'ابحث في منتجات المحل':'ابحث وأضف منتجاً'}
            </div>
            <div style={{position:'relative'}}>
              <input className='inp' placeholder='اكتب اسم المنتج...' value={pSearch} onChange={e=>setPSearch(e.target.value)}/>
              {filteredProds.length>0&&(
                <div style={{position:'absolute',top:'calc(100% + 5px)',right:0,left:0,background:'#0d1525',border:'1px solid rgba(255,255,255,.11)',borderRadius:13,overflow:'hidden',zIndex:30,boxShadow:'0 14px 40px rgba(0,0,0,.6)'}}>
                  {filteredProds.map(p=>{
                    const col=CAT_COLORS[p.category]||'#94a3b8';
                    return(
                      <div key={p.id} onClick={()=>addLine(p)} style={{padding:'9px 13px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid rgba(255,255,255,.04)',transition:'background .12s'}}
                        onMouseEnter={e=>e.currentTarget.style.background='rgba(99,179,237,.1)'}
                        onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          <span style={{fontSize:17}}>{getEmoji(p)}</span>
                          <div>
                            <div style={{fontSize:13,fontWeight:600,color:'#e2e8f0'}}>{p.name}</div>
                            <span className='tag' style={{background:`${col}14`,color:col,border:`1px solid ${col}22`,fontSize:10}}>{p.category}</span>
                          </div>
                        </div>
                        <div style={{textAlign:'left'}}>
                          <div style={{fontSize:13,fontWeight:800,color:'#63b3ed',direction:'ltr'}}>{fmtPrice(p.price)} أوق</div>
                          <div style={{fontSize:10,color:'rgba(148,163,184,.45)',direction:'ltr'}}>{isImport?'في المخزون:':'متوفر:'} {fmt(p.qty)}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* Import-only: add new product button */}
            {isImport&&(
              <div style={{marginTop:10}}>
                <button className='btn' onClick={()=>setShowNewProd(x=>!x)}
                  style={{width:'100%',padding:'9px 0',background:showNewProd?'rgba(251,191,36,.15)':'rgba(255,255,255,.05)',border:`1px solid ${showNewProd?'rgba(251,191,36,.4)':'rgba(255,255,255,.1)'}`,borderRadius:9,color:showNewProd?'#fbbf24':'#94a3b8',fontWeight:700,fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>
                  {showNewProd?'✕ إلغاء':'➕ إضافة منتج جديد غير موجود'}
                </button>

                {showNewProd&&(
                  <div style={{marginTop:10,background:'rgba(251,191,36,.05)',border:'1px solid rgba(251,191,36,.2)',borderRadius:12,padding:14,display:'flex',flexDirection:'column',gap:10}}>
                    <div style={{fontSize:12,fontWeight:700,color:'#fbbf24',marginBottom:2}}>📦 منتج جديد — سيُضاف للمخزون تلقائياً</div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                      <div style={{gridColumn:'1/-1'}}>
                        <Lbl>اسم المنتج *</Lbl>
                        <input className='inp' placeholder='مثال: سماعة JBL Tune 510' value={newProd.name} onChange={e=>setNewProd(p=>({...p,name:e.target.value}))}/>
                      </div>
                      <div>
                        <Lbl>سعر التكلفة (أوق) *</Lbl>
                        <input className='inp' inputMode='numeric' placeholder='0' value={newProd.price} onChange={e=>setNewProd(p=>({...p,price:e.target.value}))}/>
                      </div>
                      <div>
                        <Lbl>الكمية المستوردة *</Lbl>
                        <input className='inp' inputMode='numeric' placeholder='0' value={newProd.qty} onChange={e=>setNewProd(p=>({...p,qty:e.target.value}))}/>
                      </div>
                      <div style={{gridColumn:'1/-1'}}>
                        <Lbl>التصنيف</Lbl>
                        <select className='inp' value={newProd.category} onChange={e=>setNewProd(p=>({...p,category:e.target.value}))}
                          style={{cursor:'pointer'}}>
                          {CATS.map(c=><option key={c} value={c}>{c}</option>)}
                        </select>
                      </div>
                    </div>
                    <button className='btn' onClick={addNewProduct}
                      disabled={!newProd.name.trim()||!newProd.price||!newProd.qty}
                      style={{padding:10,background:(!newProd.name.trim()||!newProd.price||!newProd.qty)?'rgba(255,255,255,.05)':'linear-gradient(135deg,#d97706,#fbbf24)',border:'none',borderRadius:9,color:(!newProd.name.trim()||!newProd.price||!newProd.qty)?'rgba(148,163,184,.3)':'#fff',fontWeight:900,fontSize:13}}>
                      ✅ إضافة للفاتورة والمخزون
                    </button>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* Lines table */}
          {lines.length>0?(
            <div className='card' style={{padding:15,overflow:'hidden'}}>
              <div style={{fontSize:13,fontWeight:700,color:'#e2e8f0',marginBottom:11}}>
                📋 بنود الفاتورة ({fmt(lines.length)})
              </div>
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                  <thead>
                    <tr style={{borderBottom:'1px solid rgba(255,255,255,.07)'}}>
                      {['المنتج','الكمية',isImport?'سعر التكلفة':'سعر البيع','الإجمالي',''].map(h=>(
                        <th key={h} style={{padding:'6px 9px',textAlign:'right',color:'rgba(148,163,184,.5)',fontWeight:600,fontSize:10,whiteSpace:'nowrap'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {lines.map(l=>{
                      const col=CAT_COLORS[l.category]||'#94a3b8';
                      const stockP=products.find(p=>p.id===l.id);
                      const isBelowCost=!isImport&&l.sellPrice<l.costPrice;
                      const isNew=!stockP||stockP.qty===l.qty; // newly imported product
                      return(
                        <tr key={l.id} style={{borderBottom:'1px solid rgba(255,255,255,.04)',background:isBelowCost?'rgba(239,68,68,.03)':'transparent'}}>
                          <td style={{padding:'8px 9px'}}>
                            <div style={{fontWeight:600,color:'#e2e8f0',fontSize:12,display:'flex',alignItems:'center',gap:5}}>
                              {l.name}
                              {isImport&&isNew&&<span style={{fontSize:9,padding:'1px 5px',borderRadius:4,background:'rgba(251,191,36,.15)',color:'#fbbf24',border:'1px solid rgba(251,191,36,.25)'}}>جديد</span>}
                            </div>
                            <span className='tag' style={{background:`${col}11`,color:col,border:`1px solid ${col}1a`,fontSize:9}}>{l.category}</span>
                          </td>
                          <td style={{padding:'8px 9px'}}>
                            <div style={{display:'flex',alignItems:'center',gap:4}}>
                              <button className='btn' onClick={()=>setLines(p=>p.map(x=>x.id===l.id?{...x,qty:Math.max(1,x.qty-1)}:x))} style={{width:21,height:21,borderRadius:6,border:'1px solid rgba(255,255,255,.1)',background:'rgba(255,255,255,.05)',color:'#94a3b8',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center'}}>-</button>
                              <span style={{minWidth:20,textAlign:'center',fontWeight:700,color:'#e2e8f0',direction:'ltr'}}>{l.qty}</span>
                              <button className='btn' onClick={()=>setLines(p=>p.map(x=>x.id===l.id&&(isImport||x.qty<(stockP?.qty||99))?{...x,qty:x.qty+1}:x))} style={{width:21,height:21,borderRadius:6,border:'none',background:'rgba(99,179,237,.2)',color:'#63b3ed',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
                            </div>
                          </td>
                          <td style={{padding:'8px 9px'}}>
                            <input inputMode='numeric' value={l.sellPrice}
                              onChange={e=>handleSellPriceChange(l.id,e.target.value)}
                              onBlur={()=>handleSellPriceBlur(l.id)}
                              style={{width:75,padding:'4px 6px',background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:7,color:'#e2e8f0',fontSize:12,textAlign:'center',fontFamily:'Cairo,sans-serif',direction:'ltr'}}/>
                          </td>
                          <td style={{padding:'8px 9px',fontWeight:800,color:isImport?'#fbbf24':'#63b3ed',whiteSpace:'nowrap',direction:'ltr',textAlign:'left'}}>{fmtPrice(l.sellPrice*l.qty)} أوق</td>
                          <td style={{padding:'8px 9px'}}>
                            <button className='btn' onClick={()=>setLines(p=>p.filter(x=>x.id!==l.id))} style={{width:22,height:22,borderRadius:6,background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.18)',color:'#f87171',fontSize:11,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          ):(
            <div className='card' style={{padding:34,textAlign:'center',color:'rgba(148,163,184,.3)'}}>
              <div style={{fontSize:34,marginBottom:7}}>{isImport?'📦':'🛒'}</div>
              <div style={{fontSize:14,fontWeight:700}}>لا توجد منتجات بعد</div>
              <div style={{fontSize:12,marginTop:4}}>{isImport?'ابحث عن منتج موجود أو أضف منتجاً جديداً أعلاه':'ابحث عن منتج وأضفه أعلاه'}</div>
            </div>
          )}

          <div className='card' style={{padding:14}}>
            <Lbl>ملاحظة (اختياري)</Lbl>
            <textarea className='inp' rows={2} placeholder='ملاحظة للفاتورة...' value={note} onChange={e=>setNote(e.target.value)} style={{resize:'vertical'}}/>
          </div>
        </div>

        {/* RIGHT SUMMARY */}
        <div className='card' style={{padding:17,position:'sticky',top:20,zIndex:5}}>
          {/* Type badge */}
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,paddingBottom:11,borderBottom:'1px solid rgba(255,255,255,.07)'}}>
            <div style={{flex:1,fontSize:13,fontWeight:800,color:'#e2e8f0'}}>ملخص الفاتورة</div>
            <div style={{padding:'3px 10px',borderRadius:50,fontSize:11,fontWeight:700,background:accentBg,color:accentColor,border:`1px solid ${accentColor}40`}}>
              {isImport?'📦 استيراد':'🛒 بيع'}
            </div>
          </div>

          <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:14,padding:'9px 11px',background:'rgba(255,255,255,.03)',borderRadius:10}}>
            <div style={{width:34,height:34,borderRadius:9,background:`${customer.color}18`,border:`1px solid ${customer.color}40`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17}}>{customer.avatar}</div>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:'#e2e8f0'}}>{customer.name}</div>
              {customer.phone&&<div style={{fontSize:11,color:'rgba(148,163,184,.45)'}}>📞 {customer.phone}</div>}
            </div>
          </div>

          {isImport&&lines.length>0&&(
            <div style={{marginBottom:12,padding:'8px 11px',borderRadius:9,background:'rgba(251,191,36,.07)',border:'1px solid rgba(251,191,36,.15)',fontSize:11,color:'#fbbf24',lineHeight:1.6}}>
              📦 {lines.filter(l=>!products.find(p=>p.id===l.id&&p.qty!==l.qty)).length} منتج جديد سيُضاف للمخزون
            </div>
          )}

          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:9}}>
            <span style={{color:'rgba(148,163,184,.65)'}}>{isImport?'إجمالي التكلفة':'المجموع الجزئي'}</span>
            <span style={{fontWeight:700,color:'#e2e8f0',direction:'ltr'}}>{fmtPrice(subtotal)} أوق</span>
          </div>

          <div style={{marginBottom:13}}>
            <div style={{fontSize:11,color:'rgba(148,163,184,.55)',marginBottom:6,fontWeight:600}}>الخصم</div>
            <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:6}}>
              {[0,5,10,15,20].map(d=>(
                <button key={d} className='btn' onClick={()=>{setDiscount(d);setCustomDisc('');}} style={{flex:1,minWidth:30,padding:'4px 2px',borderRadius:7,border:(discount===d&&!customDisc)?'1px solid #63b3ed':'1px solid rgba(255,255,255,.1)',background:(discount===d&&!customDisc)?'rgba(99,179,237,.15)':'rgba(255,255,255,.04)',color:(discount===d&&!customDisc)?'#63b3ed':'rgba(148,163,184,.6)',fontSize:11,fontWeight:700}}>
                  {d}%
                </button>
              ))}
            </div>
            <input className='inp' inputMode='numeric' placeholder='خصم مخصص %...' value={customDisc} onChange={e=>setCustomDisc(e.target.value)} style={{fontSize:12,padding:'7px 10px'}}/>
            {effDisc>0&&(
              <div style={{display:'flex',justifyContent:'space-between',marginTop:7,fontSize:12}}>
                <span style={{color:'#f87171'}}>الخصم ({effDisc}%)</span>
                <span style={{fontWeight:700,color:'#f87171',direction:'ltr'}}>- {fmtPrice(discAmt)} أوق</span>
              </div>
            )}
          </div>

          <div style={{borderTop:'1px solid rgba(255,255,255,.07)',paddingTop:11,marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:13,fontWeight:700,color:'#94a3b8'}}>الإجمالي</span>
              <span style={{fontSize:19,fontWeight:900,color:accentColor,direction:'ltr'}}>{fmtPrice(total)} <span style={{fontSize:11,fontWeight:400}}>أوق</span></span>
            </div>
          </div>

          <button className='btn' onClick={confirmInvoice} disabled={lines.length===0}
            style={{width:'100%',padding:12,background:lines.length?(isImport?'linear-gradient(135deg,#d97706,#fbbf24)':'linear-gradient(135deg,#059669,#10b981)'):'rgba(255,255,255,.05)',border:'none',borderRadius:11,color:lines.length?'#fff':'rgba(148,163,184,.25)',fontWeight:900,fontSize:13,boxShadow:lines.length?`0 4px 14px ${isImport?'rgba(217,119,6,.28)':'rgba(5,150,105,.28)'}`:'none',marginBottom:7}}>
            {isImport?'📦 تأكيد الاستيراد وطباعة':'🖨️ تأكيد البيع وطباعة'}
          </button>
          <button className='btn' onClick={()=>setStep(1)} style={{width:'100%',padding:9,background:'transparent',border:'1px solid rgba(255,255,255,.08)',borderRadius:11,color:'rgba(148,163,184,.45)',fontWeight:600,fontSize:12}}>
            ← تغيير {isImport?'المورد':'العميل'}
          </button>
        </div>
      </div>

      {/* BELOW COST WARNING — export only */}
      {belowCostWarning&&(
        <Overlay onClose={()=>setBelowCostWarning(null)}>
          <div className='pop-in' onClick={e=>e.stopPropagation()} style={{background:'#0d1525',border:'1px solid rgba(239,68,68,.3)',borderRadius:20,padding:26,maxWidth:380,width:'100%',boxShadow:'0 24px 60px rgba(0,0,0,.65)',textAlign:'center'}}>
            <div style={{fontSize:46,marginBottom:10}}>⚠️</div>
            <div style={{fontSize:17,fontWeight:900,color:'#fbbf24',marginBottom:8}}>تحذير: بيع بخسارة!</div>
            <div style={{fontSize:13,color:'rgba(148,163,184,.8)',marginBottom:5,lineHeight:1.6}}>
              سعر البيع <strong style={{color:'#f87171',direction:'ltr'}}>{fmtPrice(belowCostWarning.newPrice)} أوق</strong> أقل من سعر التكلفة <strong style={{color:'#34d399',direction:'ltr'}}>{fmtPrice(belowCostWarning.originalPrice)} أوق</strong>
            </div>
            <div style={{fontSize:12,color:'rgba(148,163,184,.55)',marginBottom:20}}>{belowCostWarning.productName}</div>
            <div style={{display:'flex',gap:9}}>
              <button className='btn' onClick={()=>{setLines(p=>p.map(l=>l.id===belowCostWarning.lineId?{...l,sellPrice:belowCostWarning.originalPrice}:l));setBelowCostWarning(null);}} style={{flex:1,padding:11,background:'rgba(52,211,153,.1)',border:'1px solid rgba(52,211,153,.25)',borderRadius:11,color:'#34d399',fontWeight:700,fontSize:13}}>
                ← إعادة السعر الأصلي
              </button>
              <button className='btn' onClick={()=>setBelowCostWarning(null)} style={{flex:1,padding:11,background:'rgba(239,68,68,.12)',border:'1px solid rgba(239,68,68,.3)',borderRadius:11,color:'#f87171',fontWeight:700,fontSize:13}}>
                تأكيد السعر الجديد
              </button>
            </div>
          </div>
        </Overlay>
      )}
    </div>
  );
}


function PrintableInvoice({inv}){

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:26,paddingBottom:16,borderBottom:'3px solid #1e40af'}}>
        <div>
          <div style={{fontSize:24,fontWeight:900,color:'#1e40af'}}>محل العدالة ⚡</div>

              <td style={{padding:'8px 11px',textAlign:'center',direction:'ltr'}}>{l.qty}</td>
              <td style={{padding:'8px 11px',direction:'ltr',textAlign:'left'}}>{fmtPrice(l.sellPrice)} أوق</td>
              <td style={{padding:'8px 11px',fontWeight:700,color:'#1e40af',direction:'ltr',textAlign:'left'}}>{fmtPrice(l.sellPrice*l.qty)} أوق</td>
            </tr>
          ))}

      </table>
      <div style={{marginLeft:'auto',maxWidth:255,marginBottom:16}}>

          <span style={{color:'#64748b'}}>المجموع الجزئي</span>
          <span style={{fontWeight:600,direction:'ltr'}}>{fmtPrice(subtotal)} أوق</span>

        {discAmt>0&&(
          <div style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #e2e8f0',fontSize:12}}>
            <span style={{color:'#ef4444'}}>خصم ({discount}%)</span>
            <span style={{fontWeight:600,color:'#ef4444',direction:'ltr'}}>- {fmtPrice(discAmt)} أوق</span>
          </div>
        )}
        <div style={{display:'flex',justifyContent:'space-between',padding:'10px 10px',background:'#eff6ff',borderRadius:8,marginTop:4}}>
          <span style={{fontWeight:800,color:'#1e40af',fontSize:14}}>الإجمالي النهائي</span>
          <span style={{fontWeight:900,color:'#1e40af',fontSize:16,direction:'ltr'}}>{fmtPrice(total)} أوق</span>

/* ══════════════════════════════════════════════
   CUSTOMER VIEW
══════════════════════════════════════════════ */
function CustomerView({products,onLogout}){
  const[search,setSearch]=useState('');
  const[cat,setCat]=useState('الكل');
  const[sort,setSort]=useState('default');
  const[sel,setSel]=useState(null);

  const filtered=useMemo(()=>{
    let r=products.filter(p=>{
      const mc=cat==='الكل'||p.category===cat;
      const ms=p.name.toLowerCase().includes(search.toLowerCase());
      return mc&&ms;
    });
    if(sort==='price-asc')r=[...r].sort((a,b)=>a.price-b.price);
    if(sort==='price-desc')r=[...r].sort((a,b)=>b.price-a.price);
    return r;
  },[products,search,cat,sort]);

  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#060a14,#0a1628,#060d1e)'}}>
      <div style={{position:'fixed',inset:0,pointerEvents:'none'}}>
        <div style={{position:'absolute',top:'-15%',right:'-5%',width:500,height:500,borderRadius:'50%',background:'radial-gradient(circle,rgba(52,211,153,.07) 0%,transparent 65%)',filter:'blur(45px)'}}/>
        <div style={{position:'absolute',bottom:'-10%',left:'-5%',width:400,height:400,borderRadius:'50%',background:'radial-gradient(circle,rgba(99,179,237,.06) 0%,transparent 65%)',filter:'blur(45px)'}}/>
      </div>

      {/* Header */}
      <header style={{position:'sticky',top:0,zIndex:50,background:'rgba(6,10,20,.93)',backdropFilter:'blur(20px)',borderBottom:'1px solid rgba(255,255,255,.06)',padding:'0 22px'}}>
        <div style={{maxWidth:1200,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',height:64}}>
          <div style={{display:'flex',alignItems:'center',gap:9}}>
            <div style={{width:36,height:36,borderRadius:11,background:'linear-gradient(135deg,#059669,#10b981)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>⚡</div>
            <div>
              <div style={{fontSize:15,fontWeight:900,color:'#e2e8f0'}}>محل العدالة</div>
              <div style={{fontSize:10,color:'rgba(148,163,184,.45)'}}>متجر الهواتف والاكسسوارات</div>
            </div>
          </div>
          <div style={{flex:1,maxWidth:340,margin:'0 14px',position:'relative'}}>
            <span style={{position:'absolute',right:11,top:'50%',transform:'translateY(-50%)',color:'rgba(148,163,184,.45)',fontSize:13}}>🔍</span>
            <input className='inp' placeholder='ابحث عن منتج...' value={search} onChange={e=>setSearch(e.target.value)} style={{paddingRight:33,fontSize:13}}/>
          </div>
          <button className='btn' onClick={onLogout} style={{background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',borderRadius:9,padding:'7px 13px',color:'#94a3b8',fontSize:12,fontWeight:600}}>← خروج</button>
        </div>
      </header>

      {/* Stats */}
      <div style={{background:'rgba(52,211,153,.05)',borderBottom:'1px solid rgba(52,211,153,.11)',padding:'8px 22px'}}>
        <div style={{maxWidth:1200,margin:'0 auto',display:'flex',justifyContent:'center',gap:36,flexWrap:'wrap'}}>
          {[
            {i:'📦',l:'عدد المنتجات',v:fmt(products.length)},
            {i:'✅',l:'متوفر حالياً',v:fmt(products.filter(p=>p.qty>0).length)},
            {i:'🏷️',l:'الفئات',v:'10'},
          ].map(s=>(
            <div key={s.l} style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'rgba(255,255,255,.65)'}}>
              <span style={{fontSize:14}}>{s.i}</span>
              <span style={{opacity:.6}}>{s.l}:</span>
              <strong style={{color:'#34d399',direction:'ltr',display:'inline-block'}}>{s.v}</strong>
            </div>
          ))}
        </div>
      </div>

      <div style={{maxWidth:1200,margin:'0 auto',padding:'22px 18px',position:'relative',zIndex:1}}>
        {/* Cat pills */}
        <div style={{display:'flex',gap:7,marginBottom:14,overflowX:'auto',paddingBottom:3}}>
          {['الكل',...CATEGORIES].map(c=>{
            const col=CAT_COLORS[c]||'#34d399';
            const a=c===cat;
            return(
              <button key={c} className='btn' onClick={()=>setCat(c)} style={{padding:'5px 13px',borderRadius:50,border:a?`1px solid ${col}`:'1px solid rgba(255,255,255,.09)',background:a?`${col}18`:'rgba(255,255,255,.04)',color:a?col:'rgba(148,163,184,.65)',fontSize:12,fontWeight:600,whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:4}}>
                <span>{CAT_ICONS[c]||'📦'}</span>{c}
                <span style={{background:a?`${col}22`:'rgba(255,255,255,.07)',borderRadius:50,padding:'1px 6px',fontSize:10,fontWeight:700,direction:'ltr'}}>
                  {c==='الكل'?products.length:products.filter(p=>p.category===c).length}
                </span>
              </button>
            );
          })}
        </div>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}}>
          <div style={{fontSize:12,color:'rgba(148,163,184,.55)'}}>
            عرض <strong style={{color:'#34d399',direction:'ltr',display:'inline-block'}}>{fmt(filtered.length)}</strong> منتج
          </div>
          <select className='inp' value={sort} onChange={e=>setSort(e.target.value)} style={{width:'auto',padding:'6px 12px',fontSize:12}}>
            <option value='default'>ترتيب افتراضي</option>
            <option value='price-asc'>السعر: الأقل أولاً</option>
            <option value='price-desc'>السعر: الأعلى أولاً</option>
          </select>
        </div>

        {/* Product grid */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(175px,1fr))',gap:12}}>
          {filtered.map(p=>{
            const col=CAT_COLORS[p.category]||'#34d399';
            const emoji=getEmoji(p);
            const out=p.qty===0;
            return(
              <div key={p.id} onClick={()=>setSel(p)} style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',borderRadius:15,overflow:'hidden',cursor:'pointer',transition:'all .22s',opacity:out?.58:1}}
                onMouseEnter={e=>{if(!out){e.currentTarget.style.transform='translateY(-5px)';e.currentTarget.style.boxShadow=`0 14px 32px ${col}20`;e.currentTarget.style.borderColor=col+'44';}}}
                onMouseLeave={e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='none';e.currentTarget.style.borderColor='rgba(255,255,255,.07)';}}>
                <div style={{height:3,background:`linear-gradient(90deg,${col},${col}66)`}}/>
                <div style={{padding:'17px 13px 9px',textAlign:'center',background:`radial-gradient(circle at 50% 0%,${col}11 0%,transparent 70%)`}}>
                  <div style={{fontSize:38,lineHeight:1,marginBottom:7,filter:'drop-shadow(0 3px 6px rgba(0,0,0,.4))'}}>{emoji}</div>
                  <span className='tag' style={{background:`${col}18`,color:col,border:`1px solid ${col}28`,fontSize:10}}>{CAT_ICONS[p.category]||'📦'} {p.category}</span>
                </div>
                <div style={{padding:'7px 13px 13px'}}>
                  <div style={{fontSize:12,fontWeight:700,color:'#e2e8f0',marginBottom:7,lineHeight:1.35,minHeight:34,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{p.name}</div>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div style={{fontSize:15,fontWeight:900,color:col,direction:'ltr'}}>{fmtPrice(p.price)} <span style={{fontSize:9,fontWeight:400}}>أوق</span></div>
                    {out?<span className='tag' style={{background:'rgba(239,68,68,.12)',color:'#f87171',border:'1px solid rgba(239,68,68,.2)',fontSize:10}}>نفذ</span>
                    :<span style={{fontSize:10,color:'rgba(148,163,184,.45)',background:'rgba(255,255,255,.05)',borderRadius:7,padding:'2px 7px'}}>متوفر</span>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {sel&&(
        <Overlay onClose={()=>setSel(null)}>
          <div className='pop-in' onClick={e=>e.stopPropagation()} style={{background:'#0d1525',border:'1px solid rgba(255,255,255,.11)',borderRadius:22,padding:26,maxWidth:360,width:'100%'}}>
            {(()=>{
              const col=CAT_COLORS[sel.category]||'#34d399';
              return(
                <>
                  <button className='btn' onClick={()=>setSel(null)} style={{position:'absolute',top:14,left:14,background:'rgba(255,255,255,.07)',border:'none',color:'#94a3b8',width:28,height:28,borderRadius:8,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
                  <div style={{textAlign:'center',marginBottom:18}}>
                    <div style={{fontSize:60,marginBottom:11,filter:'drop-shadow(0 6px 12px rgba(0,0,0,.5))'}}>{getEmoji(sel)}</div>
                    <span className='tag' style={{background:`${col}18`,color:col,border:`1px solid ${col}28`,display:'inline-flex',marginBottom:10}}>{CAT_ICONS[sel.category]||'📦'} {sel.category}</span>
                    <div style={{fontSize:17,fontWeight:900,color:'#e2e8f0',lineHeight:1.3,marginTop:8}}>{sel.name}</div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
                    {[
                      {l:'السعر',v:`${fmtPrice(sel.price)} أوقية`,i:'💰',c:'#63b3ed'},
                      {l:'الكمية المتوفرة',v:sel.qty>0?fmt(sel.qty)+' قطعة':'نفذ المخزون',i:'📦',c:sel.qty>0?'#34d399':'#f87171'},
                      {l:'الفئة',v:sel.category,i:'🏷️',c:col,full:true},
                    ].map(s=>(
                      <div key={s.l} style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',borderRadius:11,padding:'11px 13px',gridColumn:s.full?'1/-1':undefined}}>
                        <div style={{fontSize:17,marginBottom:3}}>{s.i}</div>
                        <div style={{fontSize:10,color:'rgba(148,163,184,.45)',marginBottom:3}}>{s.l}</div>
                        <div style={{fontSize:13,fontWeight:700,color:s.c,direction:'ltr'}}>{s.v}</div>
                      </div>
                    ))}
                  </div>
                </>
              );
            })()}
          </div>
        </Overlay>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════
   SHARED MICRO-COMPONENTS
══════════════════════════════════════════════ */
function Overlay({children,onClose}){
  useEffect(()=>{
    document.body.style.overflow='hidden';
    return()=>{document.body.style.overflow='';};
  },[]);
  const el=document.getElementById('modal-root');
  if(!el)return null;
  return ReactDOM.createPortal(
    <div onClick={onClose} style={{position:'fixed',top:0,left:0,right:0,bottom:0,zIndex:99999,background:'rgba(0,0,0,.8)',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px',overflowY:'auto'}}>
      {children}
    </div>,
    el
  );
}

function Modal({children,onClose,title,maxW=480}){
  return(
    <Overlay onClose={onClose}>
      <div className='pop-in' onClick={e=>e.stopPropagation()} style={{background:'#0d1525',border:'1px solid rgba(255,255,255,.1)',borderRadius:20,padding:22,width:'100%',maxWidth:maxW,boxShadow:'0 20px 60px rgba(0,0,0,.65)',maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <div style={{fontSize:15,fontWeight:900,color:'#e2e8f0'}}>{title}</div>
          <Xbtn onClick={onClose}/>
        </div>
        {children}
      </div>
    </Overlay>
  );
}

function Xbtn({onClick}){
  return(
    <button className='btn' onClick={onClick} style={{background:'rgba(255,255,255,.07)',border:'none',color:'#94a3b8',width:29,height:29,borderRadius:8,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
  );
}

function Lbl({children}){
  return <div style={{fontSize:11,color:'rgba(148,163,184,.6)',marginBottom:5,fontWeight:600}}>{children}</div>;
}

function Btn({children,onClick,disabled}){
  return(
    <button className='btn' onClick={onClick} disabled={disabled} style={{width:'100%',padding:12,background:disabled?'rgba(255,255,255,.05)':'linear-gradient(135deg,#3b82f6,#8b5cf6)',border:'none',borderRadius:11,color:disabled?'rgba(148,163,184,.25)':'#fff',fontWeight:900,fontSize:14,boxShadow:disabled?'none':'0 4px 14px rgba(59,130,246,.28)'}}>
      {children}
    </button>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
